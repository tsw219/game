```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#87c97a;
}

canvas{
display:block;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

button{
font-size:20px;
padding:10px 25px;
border:none;
border-radius:10px;
background:#ffcc00;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ffd84d;
}

#scoreUI{
position:absolute;
top:15px;
left:20px;
font-size:24px;
color:black;
}

#gameOverUI{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="scoreUI"></div>

<div id="menu">
<h2>Coin Survival</h2>
<p>
矢印キーで移動<br>
コインを集める<br>
敵に当たるとゲームオーバー
</p>
<button onclick="startGame()">START</button>
</div>

<div id="gameOverUI">
<h1>GAME OVER</h1>
<button onclick="restartGame()">Restart</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let w=window.innerWidth;
let h=window.innerHeight;

canvas.width=w;
canvas.height=h;

window.onresize=()=>{
w=window.innerWidth;
h=window.innerHeight;
canvas.width=w;
canvas.height=h;
}

let player=null;
let enemies=[];
let coins=[];
let score=0;
let highScore=0;
let gameOver=false;

let enemySpeed=1.1;

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function startGame(){

document.getElementById("menu").style.display="none";

player={
x:w/2,
y:h/2,
size:22,
speed:4
};

enemies=[];
coins=[];
score=0;
enemySpeed=1.1;
gameOver=false;

spawnCoin();

}

function restartGame(){

document.getElementById("gameOverUI").style.display="none";

player.x=w/2;
player.y=h/2;

enemies=[];
coins=[];
score=0;
enemySpeed=1.1;
gameOver=false;

spawnCoin();

}

function spawnEnemy(){

let side=Math.floor(Math.random()*4);

let enemy={size:24,speed:enemySpeed};

if(side===0){enemy.x=0;enemy.y=Math.random()*h;}
if(side===1){enemy.x=w;enemy.y=Math.random()*h;}
if(side===2){enemy.x=Math.random()*w;enemy.y=0;}
if(side===3){enemy.x=Math.random()*w;enemy.y=h;}

enemies.push(enemy);

}

function spawnCoin(){

coins.push({
x:Math.random()*(w-40)+20,
y:Math.random()*(h-40)+20,
size:12
});

}

let enemyTimer=0;

function update(){

if(!player || gameOver) return;

if(keys["ArrowUp"])player.y-=player.speed;
if(keys["ArrowDown"])player.y+=player.speed;
if(keys["ArrowLeft"])player.x-=player.speed;
if(keys["ArrowRight"])player.x+=player.speed;

player.x=Math.max(0,Math.min(w,player.x));
player.y=Math.max(0,Math.min(h,player.y));

enemyTimer++;

if(enemyTimer>90){
spawnEnemy();
enemyTimer=0;
}

for(let enemy of enemies){

let dx=player.x-enemy.x;
let dy=player.y-enemy.y;

let dist=Math.sqrt(dx*dx+dy*dy);

enemy.x+=dx/dist*enemy.speed;
enemy.y+=dy/dist*enemy.speed;

if(dist<24){

gameOver=true;

document.getElementById("gameOverUI").style.display="block";

if(score>highScore){
highScore=score;
}

}

}

for(let i=coins.length-1;i>=0;i--){

let coin=coins[i];

let dx=player.x-coin.x;
let dy=player.y-coin.y;

if(Math.sqrt(dx*dx+dy*dy)<24){

score++;
coins.splice(i,1);
spawnCoin();

if(score%10===0){

enemySpeed+=0.25;

for(let e of enemies){
e.speed=enemySpeed;
}

}

}

}

}

function drawPlayer(){

ctx.fillStyle="#2f7df6";

ctx.beginPath();
ctx.arc(player.x,player.y,18,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(player.x-6,player.y-4,4,0,Math.PI*2);
ctx.arc(player.x+6,player.y-4,4,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(player.x-6,player.y-4,2,0,Math.PI*2);
ctx.arc(player.x+6,player.y-4,2,0,Math.PI*2);
ctx.fill();

}

function drawEnemy(e){

ctx.fillStyle="#ff4d4d";

ctx.beginPath();
ctx.arc(e.x,e.y,12,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(e.x-4,e.y-3,3,0,Math.PI*2);
ctx.arc(e.x+4,e.y-3,3,0,Math.PI*2);
ctx.fill();

}

function drawCoin(c){

ctx.fillStyle="#ffd700";

ctx.beginPath();
ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="#fff4b3";
ctx.lineWidth=2;
ctx.stroke();

}

function draw(){

ctx.clearRect(0,0,w,h);

if(!player) return;

for(let c of coins) drawCoin(c);
for(let e of enemies) drawEnemy(e);

drawPlayer();

document.getElementById("scoreUI").innerHTML=
"Score: "+score+" | High Score: "+highScore;

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
