<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記憶パズル</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 中央の箱は固定 */
#container{
    text-align:center;
    width:360px;
}

/* ルール */
#rules{
    font-size:14px;
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:8px;
    margin:10px 0;
}

/* ←ここが最重要 */
#game{
    width:350px;
    height:350px;
    margin:0 auto;

    display:grid;
    gap:6px;

    transition:opacity 0.2s;
}

.fadeOut{opacity:0;}
.fadeIn{opacity:1;}

.cell{
    background:#37474f;
    border-radius:8px;
    cursor:pointer;
}

.cell.active{ background:#00e676; }
.cell.correct{ background:#2979ff; }
.cell.wrong{ background:#ff1744; }

#countdown{
    font-size:40px;
    margin:10px;
}
</style>
</head>

<body>

<div id="container">

<div id="startScreen">
<h1>記憶パズル</h1>

<div id="rules">
・光った場所を覚える<br>
・同じ場所をクリック<br>
・間違えたら終了
</div>

<button onclick="startGame()">スタート</button>
</div>

<div id="gameScreen" style="display:none;">
<h2 id="level"></h2>
<div id="countdown"></div>
<div id="game"></div>
</div>

</div>

<script>
let size=3,level=1,pattern=[],player=[],showing=true;

function startGame(){
 document.getElementById("startScreen").style.display="none";
 document.getElementById("gameScreen").style.display="block";
 updateGame();
}

function updateGame(){
 const game=document.getElementById("game");
 game.classList.add("fadeOut");

 setTimeout(()=>{

  player=[];pattern=[];

  document.getElementById("level").innerText="Level "+level;

  game.innerHTML="";
  game.style.gridTemplateColumns=`repeat(${size},1fr)`;
  game.style.gridTemplateRows=`repeat(${size},1fr)`;

  for(let i=0;i<size*size;i++){
   let d=document.createElement("div");
   d.className="cell";
   d.onclick=()=>clickCell(i,d);
   game.appendChild(d);
  }

  let count=Math.min(3+Math.floor(level/2),size*size-1);
  while(pattern.length<count){
   let r=Math.floor(Math.random()*size*size);
   if(!pattern.includes(r))pattern.push(r);
  }

  game.classList.remove("fadeOut");

  showPattern();

 },150);
}

function showPattern(){
 showing=true;
 let cells=document.querySelectorAll(".cell");

 pattern.forEach(i=>cells[i].classList.add("active"));

 setTimeout(()=>{
  cells.forEach(c=>c.classList.remove("active"));
  showing=false;
 },1500);
}

function clickCell(i,d){
 if(showing||player.includes(i))return;

 player.push(i);
 d.classList.add("correct");

 if(!pattern.includes(i)){
  alert("ゲームオーバー");
  location.reload();
  return;
 }

 if(player.length===pattern.length){
  level++;
  if(level%3===0)size++;
  setTimeout(updateGame,400);
 }
}
</script>

</body>
</html>
