<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ループワールド</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:"Segoe UI",sans-serif;
}

#menu,#game,#clear{
    display:none;
    min-height:100vh;
}

/* ===== メニュー ===== */

#menu{
    padding:20px;
    text-align:center;
}

.stageSelect{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:30px;
}

.stageCard{
    background:#111;
    border:2px solid #444;
    cursor:pointer;
    transition:0.3s;
}

.stageCard:hover{
    transform:scale(1.05);
    border-color:#4fc3f7;
}

.stageImg{
    height:130px;
    background-size:cover;
    background-position:center;
}

.stageName{
    padding:10px;
    font-size:18px;
}

/* ===== ゲーム画面 ===== */

#game{
    display:flex;
    flex-direction:column;
}

#view{
    flex:1;
    background:linear-gradient(#222,#000);
    padding:30px;
    font-size:20px;
    line-height:1.7;
}

#ui{
    background:#111;
    padding:15px;
    text-align:center;
}

#ui span{
    margin:0 15px;
}

button{
    padding:8px 15px;
    background:#222;
    color:white;
    border:1px solid #555;
    cursor:pointer;
}

button:hover{
    background:#333;
}

/* ===== クリア ===== */

#clear{
    text-align:center;
    padding-top:100px;
}

</style>
</head>

<body>

<!-- ===== メニュー ===== -->
<div id="menu">

<h1>🔁 ループワールド</h1>

<p>
同じ1日を繰り返す世界。<br>
違和感を見つけ、正しい行動で脱出せよ。
</p>

<p>🎮 操作：↑ ↓ ← → / Enter</p>

<div class="stageSelect">

<div class="stageCard" onclick="start('school')">
<div class="stageImg" style="background-image:linear-gradient(#3a6,#000)"></div>
<div class="stageName">🏫 不思議な学校</div>
</div>

<div class="stageCard" onclick="start('house')">
<div class="stageImg" style="background-image:linear-gradient(#a63,#000)"></div>
<div class="stageName">🏠 ループハウス</div>
</div>

<div class="stageCard" onclick="start('mall')">
<div class="stageImg" style="background-image:linear-gradient(#66a,#000)"></div>
<div class="stageName">🛍 無限モール</div>
</div>

<div class="stageCard" onclick="start('library')">
<div class="stageImg" style="background-image:linear-gradient(#888,#000)"></div>
<div class="stageName">📚 夢の図書館</div>
</div>

</div>

</div>

<!-- ===== ゲーム ===== -->
<div id="game">

<div id="view"></div>

<div id="ui">
<span>日数：<b id="day">1</b></span>
<span>場所：<b id="place"></b></span>
<button onclick="nextDay()">🔄 次の日</button>
</div>

</div>

<!-- ===== クリア ===== -->
<div id="clear">

<h1>🎉 脱出成功</h1>

<p>あなたはループを抜け出した。</p>

<button onclick="backMenu()">🏠 メニュー</button>

</div>

<script>

const menu=document.getElementById("menu");
const game=document.getElementById("game");
const clear=document.getElementById("clear");

const view=document.getElementById("view");
const daySpan=document.getElementById("day");
const placeSpan=document.getElementById("place");

let day=1;
let stage="";
let place="room";
let found=false;

/* ===== ステージ設定 ===== */

const stages={

school:{
name:"不思議な学校",
places:{
room:[
"教室にいる。窓から光が差している。",
"机の配置が少し違う気がする…",
"黒板に見覚えのない文字がある。",
"机の下に小さな鍵が落ちている。"
],
hall:[
"廊下は静かだ。",
"時計の音がやけに大きい。",
"時計が逆回りしている。",
"出口のドアが光っている。"
]
}
},

house:{
name:"ループハウス",
places:{
room:[
"自分の部屋だ。",
"ポスターが増えている。",
"壁にヒビがある。",
"引き出しにメモがある。"
],
kitchen:[
"キッチンは無人だ。",
"冷蔵庫が勝手に開く。",
"中が空っぽだ。",
"扉が輝いている。"
]
}
},

mall:{
name:"無限モール",
places:{
shop:[
"服屋にいる。",
"マネキンが増えた。",
"全部こっちを見ている。",
"裏口が光る。"
],
food:[
"フードコートだ。",
"誰もいない。",
"時計が止まっている。",
"出口が見える。"
]
}
},

library:{
name:"夢の図書館",
places:{
desk:[
"机で勉強している。",
"本が増えている。",
"文字が動く。",
"本棚が開く。"
],
shelf:[
"本棚の前だ。",
"同じ本ばかりだ。",
"ページが白い。",
"扉が現れる。"
]
}
}

};

/* ===== 開始 ===== */

function start(s){

stage=s;
day=1;
place=Object.keys(stages[s].places)[0];
found=false;

menu.style.display="none";
game.style.display="flex";
clear.style.display="none";

update();

}

/* ===== 表示 ===== */

function update(){

daySpan.textContent=day;
placeSpan.textContent=place;

let text=
stages[stage]
.places[place]
[Math.min(day-1,3)];

view.innerHTML=
"【"+stages[stage].name+"】<br><br>"+
text+
"<br><br>"+
"← →：移動　Enter：調べる";

}

/* ===== 移動 ===== */

document.addEventListener("keydown",e=>{

if(game.style.display!=="flex")return;

const keys=Object.keys(stages[stage].places);
let i=keys.indexOf(place);

if(e.key==="ArrowRight"){
place=keys[(i+1)%keys.length];
}

if(e.key==="ArrowLeft"){
place=keys[(i-1+keys.length)%keys.length];
}

if(e.key==="Enter"){
check();
}

update();

});

/* ===== 調べる ===== */

function check(){

if(day===3 && !found){
found=true;
view.innerHTML+="<br><br>⚠ 違和感を発見した！";
}

if(found && day>=4){
game.style.display="none";
clear.style.display="block";
}

}

/* ===== 日進行 ===== */

function nextDay(){

day++;

if(day>4)day=1;

update();

}

/* ===== 戻る ===== */

function backMenu(){
menu.style.display="block";
game.style.display="none";
clear.style.display="none";
}

menu.style.display="block";

</script>

</body>
</html>
