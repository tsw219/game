<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ループワールド</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
}

/* 共通 */

#menu,#game,#clear{
    display:none;
    min-height:100vh;
}

/* ===== メニュー ===== */

#menu{
    padding:20px;
    text-align:center;
}

.stageSelect{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.stageCard{
    border:2px solid #444;
    cursor:pointer;
    background:#111;
    transition:.3s;
}

.stageCard:hover{
    transform:scale(1.05);
    border-color:#4fc3f7;
}

.stageImg{
    height:140px;
    background-size:cover;
    background-position:center;
}

.stageName{
    padding:10px;
    font-size:18px;
}

/* ===== ゲーム ===== */

#game{
    display:flex;
    flex-direction:column;
}

#view{
    flex:1;
    background-size:cover;
    background-position:center;
    padding:30px;
    font-size:20px;
    line-height:1.7;
    text-shadow:0 0 5px black;
}

#textBox{
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:10px;
    max-width:700px;
}

#ui{
    background:#111;
    padding:10px;
    text-align:center;
}

button{
    background:#222;
    color:white;
    border:1px solid #555;
    padding:7px 15px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

/* ===== クリア ===== */

#clear{
    text-align:center;
    padding-top:100px;
}

</style>
</head>
<body>

<!-- ===== メニュー ===== -->

<div id="menu">

<h1>🔁 ループワールド</h1>

<p>
同じ1日が繰り返される世界。<br>
違和感を探して脱出せよ。
</p>

<p>操作：← → 移動 / Enter 調べる</p>

<div class="stageSelect">

<div class="stageCard" onclick="start('school')">
<div class="stageImg" style="background-image:url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"400\" height=\"200\"><rect width=\"100%\" height=\"100%\" fill=\"skyblue\"/><rect y=\"80\" width=\"400\" height=\"120\" fill=\"gray\"/><rect x=\"120\" y=\"100\" width=\"60\" height=\"60\" fill=\"white\"/><rect x=\"220\" y=\"100\" width=\"60\" height=\"60\" fill=\"white\"/><text x=\"200\" y=\"40\" font-size=\"28\" text-anchor=\"middle\">SCHOOL</text></svg>')"></div>
<div class="stageName">🏫 不思議な学校</div>
</div>

<div class="stageCard" onclick="start('house')">
<div class="stageImg" style="background-image:url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"400\" height=\"200\"><rect width=\"100%\" height=\"100%\" fill=\"orange\"/><polygon points=\"200,20 360,100 40,100\" fill=\"brown\"/><rect x=\"100\" y=\"100\" width=\"200\" height=\"80\" fill=\"beige\"/><text x=\"200\" y=\"170\" font-size=\"24\" text-anchor=\"middle\">HOUSE</text></svg>')"></div>
<div class="stageName">🏠 ループハウス</div>
</div>

<div class="stageCard" onclick="start('mall')">
<div class="stageImg" style="background-image:url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"400\" height=\"200\"><rect width=\"100%\" height=\"100%\" fill=\"purple\"/><rect x=\"40\" y=\"60\" width=\"100\" height=\"80\" fill=\"pink\"/><rect x=\"160\" y=\"60\" width=\"100\" height=\"80\" fill=\"pink\"/><rect x=\"280\" y=\"60\" width=\"80\" height=\"80\" fill=\"pink\"/><text x=\"200\" y=\"40\" font-size=\"26\" text-anchor=\"middle\">MALL</text></svg>')"></div>
<div class="stageName">🛍 無限モール</div>
</div>

<div class="stageCard" onclick="start('library')">
<div class="stageImg" style="background-image:url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"400\" height=\"200\"><rect width=\"100%\" height=\"100%\" fill=\"darkgreen\"/><rect x=\"40\" y=\"40\" width=\"320\" height=\"120\" fill=\"saddlebrown\"/><text x=\"200\" y=\"120\" font-size=\"26\" text-anchor=\"middle\" fill=\"white\">LIBRARY</text></svg>')"></div>
<div class="stageName">📚 夢の図書館</div>
</div>

</div>

</div>

<!-- ===== ゲーム ===== -->

<div id="game">

<div id="view">

<div id="textBox"></div>

</div>

<div id="ui">
日数：<span id="day">1</span>
　
場所：<span id="place"></span>
　
<button onclick="nextDay()">次の日</button>
</div>

</div>

<!-- ===== クリア ===== -->

<div id="clear">

<h1>🎉 脱出成功</h1>
<p>ループは終わった。</p>

<button onclick="backMenu()">メニューへ</button>

</div>

<script>

const menu=document.getElementById("menu");
const game=document.getElementById("game");
const clear=document.getElementById("clear");

const view=document.getElementById("view");
const textBox=document.getElementById("textBox");

const daySpan=document.getElementById("day");
const placeSpan=document.getElementById("place");

let stage="";
let day=1;
let place="";
let found=false;

/* ===== ステージ ===== */

const stages={

school:{
name:"不思議な学校",
bg:"linear-gradient(#5af,#135)",
places:{
教室:[
"教室にいる。",
"机が増えている。",
"黒板が変だ。",
"鍵を見つけた。"
],
廊下:[
"廊下だ。",
"時計が逆だ。",
"音が消えた。",
"出口が光る。"
]
}
},

house:{
name:"ループハウス",
bg:"linear-gradient(#fa5,#531)",
places:{
部屋:[
"自分の部屋。",
"壁が変形。",
"影が動く。",
"メモ発見。"
],
台所:[
"台所だ。",
"誰もいない。",
"時間停止。",
"扉出現。"
]
}
},

mall:{
name:"無限モール",
bg:"linear-gradient(#a5f,#213)",
places:{
売り場:[
"売り場。",
"人形増殖。",
"視線を感じる。",
"裏口発光。"
],
広場:[
"広場。",
"無音。",
"空が暗い。",
"出口発見。"
]
}
},

library:{
name:"夢の図書館",
bg:"linear-gradient(#3a5,#020)",
places:{
机:[
"勉強席。",
"本が増殖。",
"文字が動く。",
"棚が開く。"
],
本棚:[
"本棚前。",
"白紙本。",
"空間歪み。",
"扉出現。"
]
}
}

};

/* ===== 開始 ===== */

function start(s){

stage=s;
day=1;
found=false;

place=Object.keys(stages[s].places)[0];

menu.style.display="none";
game.style.display="flex";
clear.style.display="none";

update();

}

/* ===== 更新 ===== */

function update(){

daySpan.textContent=day;
placeSpan.textContent=place;

view.style.background=stages[stage].bg;

let text=
stages[stage].places[place][Math.min(day-1,3)];

textBox.innerHTML=
"【"+stages[stage].name+"】<br><br>"+
text+
"<br><br>"+
"← → 移動 / Enter 調べる";

}

/* ===== 操作 ===== */

document.addEventListener("keydown",e=>{

if(game.style.display!=="flex")return;

let keys=Object.keys(stages[stage].places);
let i=keys.indexOf(place);

if(e.key==="ArrowRight"){
place=keys[(i+1)%keys.length];
}

if(e.key==="ArrowLeft"){
place=keys[(i-1+keys.length)%keys.length];
}

if(e.key==="Enter"){
check();
}

update();

});

/* ===== 調査 ===== */

function check(){

if(day===3 && !found){
found=true;
textBox.innerHTML+="<br><br>⚠ 違和感を見つけた！";
}

if(found && day>=4){
game.style.display="none";
clear.style.display="block";
}

}

/* ===== 日進行 ===== */

function nextDay(){

day++;

if(day>4)day=1;

update();

}

/* ===== 戻る ===== */

function backMenu(){

menu.style.display="block";
game.style.display="none";
clear.style.display="none";

}

menu.style.display="block";

</script>
</body>
</html>
