<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記憶パズル</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 固定コンテナ */
#container{
    text-align:center;
    width:360px;
}

/* ルール */
#rules{
    font-size:14px;
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:8px;
    margin:10px 0;
}

/* ←ガシャ完全防止 */
#game{
    width:350px;
    height:350px;
    margin:0 auto;

    display:grid;
    gap:6px;
    transition:opacity 0.2s;
}

.fadeOut{opacity:0;}

.cell{
    background:#37474f;
    border-radius:8px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

.cell:active{transform:scale(0.9);}
.cell.active{background:#00e676;}
.cell.correct{background:#2979ff;}
.cell.wrong{background:#ff1744;}

#countdown{
    font-size:40px;
    margin:10px;
}

/* ランキング */
#ranking{
    font-size:14px;
    color:#ffd54f;
    text-align:left;
}
</style>
</head>

<body>

<div id="container">

<div id="startScreen">
<h1>記憶パズル</h1>

<div id="rules">
・光った場所を覚える<br>
・同じ場所をクリック<br>
・間違えたら終了
</div>

名前：<input id="nameInput" placeholder="空欄OK"><br>
<button onclick="startGame()">スタート</button>

<div id="ranking"></div>
</div>

<div id="gameScreen" style="display:none;">
<h2 id="level"></h2>
<div id="countdown"></div>
<div id="game"></div>
</div>

<div id="gameOver" style="display:none;">
<h1>ゲームオーバー</h1>
<p id="finalScore"></p>
<button onclick="goToStart()">最初に戻る</button>
</div>

</div>

<script>
let size=3,level=1,pattern=[],player=[],showing=true,timer;
let scores=JSON.parse(localStorage.getItem("ranking")||"[]");
let playerName="";

function updateRanking(){
 scores=scores.filter(s=>s&&s.name&&s.score);
 let t="🏆 Ranking<br>";
 if(scores.length===0)t+="まだ記録なし";
 else scores.slice(0,5).forEach((s,i)=>t+=`${i+1}. ${s.name}:Lv${s.score}<br>`);
 document.getElementById("ranking").innerHTML=t;
 localStorage.setItem("ranking",JSON.stringify(scores));
}

function getName(){
 let v=document.getElementById("nameInput").value.trim();
 if(v===""){
  let n=1;while(scores.some(s=>s.name==="Player"+n))n++;
  return"Player"+n;
 }
 if(scores.some(s=>s.name===v)){alert("同じ名前があります");return null;}
 return v;
}

function startGame(){
 let n=getName();
 if(!n)return;
 playerName=n;

 document.getElementById("startScreen").style.display="none";
 document.getElementById("gameScreen").style.display="block";

 level=1;size=3;
 updateGame();
}

function updateGame(){
 const game=document.getElementById("game");
 game.classList.add("fadeOut");

 setTimeout(()=>{

  player=[];pattern=[];
  document.getElementById("level").innerText="Level "+level;

  game.innerHTML="";
  game.style.gridTemplateColumns=`repeat(${size},1fr)`;
  game.style.gridTemplateRows=`repeat(${size},1fr)`;

  for(let i=0;i<size*size;i++){
   let d=document.createElement("div");
   d.className="cell";
   d.onclick=()=>clickCell(i,d);
   game.appendChild(d);
  }

  let count=Math.min(3+Math.floor(level/2),size*size-1);
  while(pattern.length<count){
   let r=Math.floor(Math.random()*size*size);
   if(!pattern.includes(r))pattern.push(r);
  }

  game.classList.remove("fadeOut");

  showPattern();

 },150);
}

function showPattern(){
 showing=true;
 let cells=document.querySelectorAll(".cell");

 pattern.forEach(i=>cells[i].classList.add("active"));

 let t=1500,start=Date.now();
 clearInterval(timer);
 timer=setInterval(()=>{
  let r=Math.max(0,t-(Date.now()-start));
  document.getElementById("countdown").innerText=(r/1000).toFixed(2);
 },10);

 setTimeout(()=>{
  cells.forEach(c=>c.classList.remove("active"));
  showing=false;
  document.getElementById("countdown").innerText="";
 },t);
}

function clickCell(i,d){
 if(showing||player.includes(i))return;

 player.push(i);
 d.classList.add("correct");

 if(!pattern.includes(i)){
  d.classList.add("wrong");
  gameOver();
  return;
 }

 if(player.length===pattern.length){
  level++;
  if(level%3===0)size=Math.min(size+1,7);
  setTimeout(updateGame,400);
 }
}

function gameOver(){
 document.getElementById("gameScreen").style.display="none";
 document.getElementById("gameOver").style.display="block";

 document.getElementById("finalScore").innerText=
  playerName+" のスコア: Lv "+level;

 scores.push({name:playerName,score:level});
 scores.sort((a,b)=>b.score-a.score);
 updateRanking();
}

function goToStart(){
 document.getElementById("gameOver").style.display="none";
 document.getElementById("startScreen").style.display="block";
 updateRanking();
}

updateRanking();
</script>

</body>
</html>
