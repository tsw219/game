<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歩ける街 脱出ゲーム</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#dff6ff;
text-align:center;
}

/* ホーム */
#menu{
padding:20px;
}

.city{
width:300px;
margin:10px auto;
padding:15px;
background:#4facfe;
color:white;
border-radius:10px;
cursor:pointer;
}

/* ゲーム */
#game{
display:none;
}

#info{
margin:10px;
}

/* マップ */
#map{
display:grid;
grid-template-columns:repeat(5,60px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.cell{
width:60px;
height:60px;
background:#aee;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.player{background:#ffcc00;}
.house{background:#ff9999;}
.shop{background:#99ff99;}

/* テキスト */
#text{
margin-top:15px;
background:black;
color:white;
padding:10px;
}

/* ボタン */
button{
margin:5px;
padding:8px 15px;
}
</style>
</head>

<body>

<!-- メニュー -->
<div id="menu">
<h1>5つの街からの脱出</h1>
<p>街を選択してください</p>
<div class="city" onclick="startGame()">静止した住宅街</div>
</div>

<!-- ゲーム -->
<div id="game">

<div id="info">
矢印キーで移動 / 建物の上でEnterで入る
<button onclick="goMenu()">戻る</button>
</div>

<div id="map"></div>

<div id="inside"></div>

<div id="text">探索しよう</div>

</div>

<script>
let mapData = [
["","","H","",""],
["","","","",""],
["","P","","S",""],
["","","","",""],
["","","","",""]
];

let player = {x:1,y:2};
let inside = false;
let items=[];

/* 開始 */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";
drawMap();
}

/* マップ描画 */
function drawMap(){
let html="";
for(let y=0;y<5;y++){
for(let x=0;x<5;x++){

let cls="cell";
let content="";

if(player.x===x && player.y===y){
cls+=" player";
content="自";
}else if(mapData[y][x]==="H"){
cls+=" house";
content="家";
}else if(mapData[y][x]==="S"){
cls+=" shop";
content="店";
}

html+=`<div class="${cls}">${content}</div>`;
}
}
document.getElementById("map").innerHTML=html;
}

/* 移動 */
document.addEventListener("keydown",e=>{
if(inside) return;

if(e.key==="ArrowUp") player.y--;
if(e.key==="ArrowDown") player.y++;
if(e.key==="ArrowLeft") player.x--;
if(e.key==="ArrowRight") player.x++;

/* 範囲制限 */
player.x=Math.max(0,Math.min(4,player.x));
player.y=Math.max(0,Math.min(4,player.y));

drawMap();

/* 入る */
if(e.key==="Enter"){
enter();
}
});

/* 建物入る */
function enter(){
let tile = mapData[player.y][player.x];

if(tile==="H"){
inside=true;
document.getElementById("inside").innerHTML=`
<h3>家の中</h3>
<button onclick="getItem()">机を調べる</button>
<button onclick="exit()">出る</button>
`;
setText("机に何かある");
}

if(tile==="S"){
inside=true;
document.getElementById("inside").innerHTML=`
<h3>店の中</h3>
<button onclick="hint('3月15日')">カレンダー</button>
<button onclick="hint('午後3時')">メモ</button>
<button onclick="solve()">時計</button>
<button onclick="exit()">出る</button>
`;
setText("ヒントを探そう");
}
}

/* 出る */
function exit(){
inside=false;
document.getElementById("inside").innerHTML="";
}

/* アイテム */
function getItem(){
if(!items.includes("電池")){
items.push("電池");
setText("電池を入手");
}
}

/* ヒント */
function hint(t){
setText(t);
}

/* 謎 */
function solve(){
let ans=prompt("時間は？");

if(ans==="15"){
setText("脱出成功！");
setTimeout(goMenu,2000);
}else{
setText("違う");
}
}

/* テキスト */
function setText(t){
document.getElementById("text").innerText=t;
}

/* 戻る */
function goMenu(){
document.getElementById("game").style.display="none";
document.getElementById("menu").style.display="block";
player={x:1,y:2};
items=[];
exit();
}
</script>

</body>
</html>
