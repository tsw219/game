<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記憶パズルゲーム</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

h1{
    margin:20px;
}

#game{
    display:grid;
    gap:5px;
    justify-content:center;
    margin-top:20px;
}

.cell{
    width:50px;
    height:50px;
    background:#444;
    cursor:pointer;
    transition:0.2s;
}

.cell.active{
    background:#4caf50;
}

.cell.correct{
    background:#2196f3;
}

.cell.wrong{
    background:#e53935;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>記憶パズル</h1>
<p id="info">スタートを押してください</p>
<button onclick="startGame()">スタート</button>

<div id="game"></div>

<script>
let size = 3;
let pattern = [];
let player = [];
let showing = true;

function startGame(){
    player = [];
    pattern = [];

    const game = document.getElementById("game");
    game.innerHTML = "";

    game.style.gridTemplateColumns = `repeat(${size}, 50px)`;

    for(let i=0;i<size*size;i++){
        const div = document.createElement("div");
        div.classList.add("cell");

        div.onclick = () => clickCell(i, div);

        game.appendChild(div);
    }

    // ランダムパターン生成
    let count = Math.floor(size*size/3);
    while(pattern.length < count){
        let r = Math.floor(Math.random()*size*size);
        if(!pattern.includes(r)) pattern.push(r);
    }

    showPattern();
}

function showPattern(){
    showing = true;
    document.getElementById("info").innerText = "覚えて！";

    const cells = document.querySelectorAll(".cell");

    pattern.forEach(i => {
        cells[i].classList.add("active");
    });

    setTimeout(() => {
        cells.forEach(c => c.classList.remove("active"));
        showing = false;
        document.getElementById("info").innerText = "再現してください";
    }, 1500 + size*200);
}

function clickCell(index, div){
    if(showing) return;

    if(player.includes(index)) return;

    player.push(index);
    div.classList.add("correct");

    if(!pattern.includes(index)){
        div.classList.add("wrong");
        document.getElementById("info").innerText = "失敗！最初から";
        size = 3;
        return;
    }

    // クリア判定
    if(player.length === pattern.length){
        document.getElementById("info").innerText = "成功！次へ";

        size++;
        setTimeout(startGame, 1000);
    }
}
</script>

</body>
</html>
