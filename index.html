<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャゲーム</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #ffb347, #ffcc33);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  h1 {
    color: #fff;
    text-shadow: 2px 2px #ff6f61;
  }
  #gachaButton {
    padding: 15px 30px;
    font-size: 18px;
    margin: 20px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background-color: #ff6f61;
    color: white;
    transition: 0.2s;
  }
  #gachaButton:hover {
    background-color: #ff856f;
  }
  #result {
    margin-top: 20px;
    font-size: 20px;
    color: #fff;
    text-align: center;
  }
  .character {
    font-size: 50px;
    margin-top: 15px;
  }
</style>
</head>
<body>

<h1>ガチャを引こう！</h1>
<button id="gachaButton">ガチャを回す</button>
<div id="result"></div>

<script>
  const characters = [
    {name: "☆SSRキャラクター☆", emoji: "🌟", rarity: "SSR"},
    {name: "☆SRキャラクター☆", emoji: "✨", rarity: "SR"},
    {name: "☆Rキャラクター☆", emoji: "💫", rarity: "R"},
    {name: "☆Nキャラクター☆", emoji: "⭐", rarity: "N"}
  ];

  const probabilities = {
    SSR: 5,  // 5%
    SR: 15,  // 15%
    R: 30,   // 30%
    N: 50    // 50%
  };

  function getRandomCharacter() {
    const rand = Math.random() * 100;
    let cumulative = 0;

    for (let rarity of ["SSR","SR","R","N"]) {
      cumulative += probabilities[rarity];
      if (rand < cumulative) {
        return characters.find(c => c.rarity === rarity);
      }
    }
  }

  document.getElementById("gachaButton").addEventListener("click", () => {
    const character = getRandomCharacter();
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = `
      <div class="character">${character.emoji}</div>
      <div>${character.name}</div>
      <div>レアリティ: ${character.rarity}</div>
    `;
  });
</script>

</body>
</html>
