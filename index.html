<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Coin Survivor</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:sans-serif;
background:#87ceeb;
}

#ui{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-weight:bold;
font-size:22px;
}

#scoreBox{
background:white;
display:inline-block;
padding:8px 25px;
border-radius:15px;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:15px;
text-align:center;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#ffd400;
cursor:pointer;
}
</style>

</head>

<body>

<div id="ui">
<div id="scoreBox">
コイン: <span id="score">0</span>
　
ハイスコア: <span id="high">0</span>
</div>
</div>

<div id="menu">

<h2>コインサバイバー</h2>

<p>
😀 あなた<br>
😈 敵（当たるとゲームオーバー）
</p>

<p>
🟡 コイン = 1点<br>
🟣 レアコイン = 3点<br>
🔵 レアコイン = 5点
</p>

<p>
コインを集めよう<br>
10コインごとに敵が増える
</p>

<button onclick="startGame()">スタート</button>

</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let W,H

function resize(){
W=window.innerWidth
H=window.innerHeight
canvas.width=W
canvas.height=H
}
resize()
window.addEventListener("resize",resize)

let player
let coins=[]
let enemies=[]

let score=0
let high=localStorage.getItem("coinHigh")||0
document.getElementById("high").innerText=high

let game=false

function startGame(){

document.getElementById("menu").style.display="none"

player={
x:W/2,
y:H/2,
size:20,
speed:4
}

coins=[]
enemies=[]

score=0

spawnCoin()

for(let i=0;i<3;i++){
spawnEnemy()
}

game=true
loop()

}

function spawnCoin(){

let r=Math.random()

let value=1
let color="gold"

if(r<0.15){
value=5
color="cyan"
}
else if(r<0.4){
value=3
color="purple"
}

let x=Math.random()*(W-60)+30
let y=Math.random()*(H-120)+90

coins.push({
x,y,
value,
color,
size:25
})

}

function spawnEnemy(){

let x=Math.random()*W
let y=Math.random()*H

enemies.push({
x,y,
size:20,
speed:1.6
})

}

let keys={}

window.addEventListener("keydown",e=>keys[e.key]=true)
window.addEventListener("keyup",e=>keys[e.key]=false)

function update(){

if(keys["ArrowUp"]||keys["w"]) player.y-=player.speed
if(keys["ArrowDown"]||keys["s"]) player.y+=player.speed
if(keys["ArrowLeft"]||keys["a"]) player.x-=player.speed
if(keys["ArrowRight"]||keys["d"]) player.x+=player.speed

player.x=Math.max(player.size,Math.min(W-player.size,player.x))
player.y=Math.max(player.size+50,Math.min(H-player.size,player.y))

for(let e of enemies){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

e.x+=dx/d*e.speed
e.y+=dy/d*e.speed

if(d<player.size){
gameOver()
}

}

for(let i=coins.length-1;i>=0;i--){

let c=coins[i]

let d=Math.hypot(player.x-c.x,player.y-c.y)

if(d<player.size+c.size/2){

score+=c.value
document.getElementById("score").innerText=score

coins.splice(i,1)

spawnCoin()

if(score%10===0){
spawnEnemy()
}

}

}

}

function draw(){

ctx.clearRect(0,0,W,H)

for(let c of coins){

ctx.beginPath()
ctx.fillStyle=c.color
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()

}

for(let e of enemies){

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(e.x,e.y,e.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(e.x-5,e.y-4,4,0,Math.PI*2)
ctx.arc(e.x+5,e.y-4,4,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(e.x-5,e.y-4,2,0,Math.PI*2)
ctx.arc(e.x+5,e.y-4,2,0,Math.PI*2)
ctx.fill()

}

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()

}

function loop(){

if(!game) return

update()
draw()

requestAnimationFrame(loop)

}

function gameOver(){

game=false

if(score>high){
high=score
localStorage.setItem("coinHigh",high)
}

document.getElementById("high").innerText=high

document.getElementById("menu").innerHTML=
"<h2>ゲームオーバー</h2>"+
"<p>スコア: "+score+"</p>"+
"<button onclick='startGame()'>もう一回</button>"

document.getElementById("menu").style.display="block"

}

</script>

</body>
</html>
