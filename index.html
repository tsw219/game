<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>One Day Escape</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

#menu,#game,#clear{
  display:none;
  width:100vw;
  height:100vh;
}

.show{display:block;}

h1{margin-top:20px;}

.stage-btn{
  display:inline-block;
  margin:15px;
  cursor:pointer;
}

.stage-btn canvas{
  border:3px solid #fff;
}

#gameArea{
  position:relative;
  width:90vw;
  height:80vh;
  margin:auto;
  border:3px solid #fff;
  background:#222;
  overflow:hidden;
}

.diff{
  position:absolute;
}

.diff.found{
  border:2px solid red;
  background:rgba(255,0,0,0.2);
}

#timer{font-size:22px;margin:10px;}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="show">
<h1>One Day Escape</h1>
<p>違いを探して脱出せよ</p>

<div class="stage-btn" onclick="startGame('school')">
<canvas id="c1" width="200" height="140"></canvas>
<div>学校</div>
</div>

<div class="stage-btn" onclick="startGame('home')">
<canvas id="c2" width="200" height="140"></canvas>
<div>家</div>
</div>

<div class="stage-btn" onclick="startGame('library')">
<canvas id="c3" width="200" height="140"></canvas>
<div>図書館</div>
</div>

<div class="stage-btn" onclick="startGame('mall')">
<canvas id="c4" width="200" height="140"></canvas>
<div>モール</div>
</div>
</div>

<!-- GAME -->
<div id="game">

<div id="timer">08:00</div>

<div id="gameArea"></div>

<div>発見: <span id="count">0</span>/5</div>

</div>

<!-- CLEAR -->
<div id="clear">
<h1>ESCAPE!</h1>
<button onclick="backMenu()">戻る</button>
</div>

<script>

const menu=document.getElementById("menu");
const game=document.getElementById("game");
const clear=document.getElementById("clear");

const gameArea=document.getElementById("gameArea");
const countText=document.getElementById("count");
const timerText=document.getElementById("timer");

let found=0,time=480,timer;

const stages={

school:{
color:"#3a6",
diffs:[
{x:50,y:50,w:60,h:60},
{x:200,y:120,w:70,h:50},
{x:350,y:200,w:80,h:60},
{x:500,y:100,w:60,h:70},
{x:650,y:250,w:70,h:60}
]
},

home:{
color:"#963",
diffs:[
{x:80,y:60,w:70,h:60},
{x:250,y:150,w:60,h:70},
{x:400,y:80,w:80,h:60},
{x:550,y:220,w:60,h:60},
{x:700,y:140,w:70,h:70}
]
},

library:{
color:"#369",
diffs:[
{x:60,y:90,w:70,h:60},
{x:220,y:180,w:60,h:70},
{x:380,y:120,w:80,h:60},
{x:540,y:260,w:60,h:60},
{x:690,y:100,w:70,h:70}
]
},

mall:{
color:"#933",
diffs:[
{x:100,y:200,w:60,h:70},
{x:260,y:100,w:70,h:60},
{x:420,y:250,w:80,h:60},
{x:580,y:140,w:60,h:70},
{x:740,y:280,w:70,h:60}
]
}

};

function drawPreview(id,color,text){

const c=document.getElementById(id);
const ctx=c.getContext("2d");

ctx.fillStyle=color;
ctx.fillRect(0,0,200,140);

ctx.fillStyle="#fff";
ctx.font="20px sans-serif";
ctx.fillText(text,50,75);

}

drawPreview("c1","#3a6","School");
drawPreview("c2","#963","Home");
drawPreview("c3","#369","Library");
drawPreview("c4","#933","Mall");


function startGame(name){

menu.classList.remove("show");
game.classList.add("show");

found=0;
time=480;
countText.textContent=0;

gameArea.innerHTML="";

const s=stages[name];

gameArea.style.background=s.color;

s.diffs.forEach(d=>{

const div=document.createElement("div");
div.className="diff";

div.style.left=d.x+"px";
div.style.top=d.y+"px";
div.style.width=d.w+"px";
div.style.height=d.h+"px";

div.onclick=()=>{

if(div.classList.contains("found"))return;

div.classList.add("found");
found++;
countText.textContent=found;

if(found>=5)clearGame();

};

gameArea.appendChild(div);

});

startTimer();

}

function startTimer(){

clearInterval(timer);

timer=setInterval(()=>{

time--;

let m=Math.floor(time/60);
let s=time%60;

timerText.textContent=
`0${m}:${s<10?"0"+s:s}`;

if(time<=0){
alert("TIME OVER");
backMenu();
}

},1000);

}

function clearGame(){

clearInterval(timer);

game.classList.remove("show");
clear.classList.add("show");

}

function backMenu(){

clearInterval(timer);

game.classList.remove("show");
clear.classList.remove("show");
menu.classList.add("show");

}

</script>

</body>
</html>
