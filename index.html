<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>影と光の迷路</title>
<style>
  body {
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    justify-content: center;
  }
  canvas {
    background: #000;
    border: 3px solid #fff;
  }
  h1 {
    margin-bottom: 10px;
  }
  #instructions {
    font-size: 14px;
    margin-top: 5px;
  }
</style>
</head>
<body>

<h1>影と光の迷路</h1>
<canvas id="game" width="400" height="400"></canvas>
<div id="instructions">矢印キーで移動。光で道を探せ！</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const SIZE = 20; // マスのサイズ
const ROWS = canvas.height / SIZE;
const COLS = canvas.width / SIZE;

let player = {x:1, y:1};
let lightRadius = 3;

// 迷路ランダム生成（簡易版）
let maze = [];
for(let y=0;y<ROWS;y++){
  maze[y]=[];
  for(let x=0;x<COLS;x++){
    if(y===0||x===0||y===ROWS-1||x===COLS-1) maze[y][x]=1; // 壁
    else maze[y][x]=Math.random()<0.2?1:0; // 20%壁
  }
}
maze[1][1]=0; // プレイヤースタート
maze[ROWS-2][COLS-2]=0; // ゴール

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      let dx = x - player.x;
      let dy = y - player.y;
      if(Math.sqrt(dx*dx + dy*dy) <= lightRadius){
        if(maze[y][x]===1) ctx.fillStyle = '#fff';
        else if(x===COLS-2 && y===ROWS-2) ctx.fillStyle='gold';
        else ctx.fillStyle = '#444';
        ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
      }
    }
  }

  // プレイヤー
  ctx.fillStyle = '#0f0';
  ctx.fillRect(player.x*SIZE,player.y*SIZE,SIZE,SIZE);
}

document.addEventListener('keydown', e=>{
  let nx = player.x;
  let ny = player.y;
  if(e.key==='ArrowUp') ny--;
  else if(e.key==='ArrowDown') ny++;
  else if(e.key==='ArrowLeft') nx--;
  else if(e.key==='ArrowRight') nx++;
  if(maze[ny][nx]===0) player={x:nx,y:ny};

  // ゴール判定
  if(player.x===COLS-2 && player.y===ROWS-2){
    alert('クリア！おめでとう！');
    // リセット
    player={x:1,y:1};
  }
  draw();
});

draw();
</script>

</body>
</html>
