<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Time Loop Runner</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#111, #333);
    font-family: sans-serif;
    text-align: center;
    color: white;
}

h1 {
    margin: 10px;
}

#game {
    background: #000;
    display: block;
    margin: auto;
    border: 3px solid white;
}

#info {
    margin: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>⏳ Time Loop Runner</h1>
<canvas id="game" width="800" height="400"></canvas>

<div id="info">
    スペース：ジャンプ / R：リスタート
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameSpeed;
let score;
let gameOver;

// プレイヤー
const player = {
    x: 80,
    y: 300,
    w: 40,
    h: 40,
    vy: 0,
    jump: false
};

// 配列
let enemies = [];
let gems = [];

// 初期化
function reset() {
    gameSpeed = 4;
    score = 0;
    gameOver = false;
    player.y = 300;
    player.vy = 0;
    enemies = [];
    gems = [];
}

// 敵生成
function spawnEnemy() {
    enemies.push({
        x: 800,
        y: 320,
        w: 30,
        h: 30
    });
}

// 宝石生成
function spawnGem() {
    gems.push({
        x: 800,
        y: Math.random() * 200 + 100,
        r: 10
    });
}

// 入力
document.addEventListener("keydown", e => {
    if (e.code === "Space" && !player.jump && !gameOver) {
        player.vy = -13;
        player.jump = true;
    }

    if (e.code === "KeyR") {
        reset();
    }
});

// 当たり判定
function hit(a, b) {
    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

// 更新
function update() {
    if (gameOver) return;

    // 重力
    player.vy += 0.6;
    player.y += player.vy;

    if (player.y >= 300) {
        player.y = 300;
        player.vy = 0;
        player.jump = false;
    }

    // 敵
    enemies.forEach(e => {
        e.x -= gameSpeed;

        if (hit(player, e)) {
            gameOver = true;
        }
    });

    enemies = enemies.filter(e => e.x > -50);

    // 宝石
    gems.forEach(g => {
        g.x -= gameSpeed;

        const dx = player.x + 20 - g.x;
        const dy = player.y + 20 - g.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 25) {
            score += 10;
            g.collected = true;
        }
    });

    gems = gems.filter(g => !g.collected && g.x > -50);

    // スコア
    score += 0.05;
    gameSpeed += 0.0005;

    // ランダム生成
    if (Math.random() < 0.02) spawnEnemy();
    if (Math.random() < 0.015) spawnGem();
}

// 描画
function draw() {
    ctx.clearRect(0, 0, 800, 400);

    // 地面
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 340, 800, 60);

    // プレイヤー
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // 敵
    ctx.fillStyle = "red";
    enemies.forEach(e => {
        ctx.fillRect(e.x, e.y, e.w, e.h);
    });

    // 宝石
    ctx.fillStyle = "gold";
    gems.forEach(g => {
        ctx.beginPath();
        ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
        ctx.fill();
    });

    // UI
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("Score: " + Math.floor(score), 10, 25);
    ctx.fillText("Speed: " + gameSpeed.toFixed(1), 10, 50);

    // GAME OVER
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,800,400);

        ctx.fillStyle = "white";
        ctx.font = "50px sans-serif";
        ctx.fillText("GAME OVER", 230, 180);

        ctx.font = "25px sans-serif";
        ctx.fillText("Rキーでリスタート", 280, 230);
    }
}

// ループ
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// 開始
reset();
loop();
</script>

</body>
</html>
