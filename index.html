<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Survival Coin Game</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#222;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Coin Survival</h2>
<p>矢印キーで移動 / コインを集める / 敵に当たると終了</p>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
x:300,
y:200,
size:20,
speed:4
};

let keys={};

let enemies=[];
let coins=[];

let score=0;
let gameOver=false;

document.addEventListener("keydown",e=>{
keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key]=false;
});

function spawnEnemy(){

let side=Math.floor(Math.random()*4);

let enemy={size:20,speed:1+Math.random()*1.5};

if(side===0){
enemy.x=0;
enemy.y=Math.random()*400;
}

if(side===1){
enemy.x=600;
enemy.y=Math.random()*400;
}

if(side===2){
enemy.x=Math.random()*600;
enemy.y=0;
}

if(side===3){
enemy.x=Math.random()*600;
enemy.y=400;
}

enemies.push(enemy);

}

function spawnCoin(){

coins.push({
x:Math.random()*560+20,
y:Math.random()*360+20,
size:10
});

}

spawnCoin();

let enemyTimer=0;

function update(){

if(gameOver)return;

if(keys["ArrowUp"])player.y-=player.speed;
if(keys["ArrowDown"])player.y+=player.speed;
if(keys["ArrowLeft"])player.x-=player.speed;
if(keys["ArrowRight"])player.x+=player.speed;

player.x=Math.max(0,Math.min(600-player.size,player.x));
player.y=Math.max(0,Math.min(400-player.size,player.y));

enemyTimer++;

if(enemyTimer>60){
spawnEnemy();
enemyTimer=0;
}

for(let enemy of enemies){

let dx=player.x-enemy.x;
let dy=player.y-enemy.y;

let dist=Math.sqrt(dx*dx+dy*dy);

enemy.x+=dx/dist*enemy.speed;
enemy.y+=dy/dist*enemy.speed;

if(dist<20){
gameOver=true;
}

}

for(let i=coins.length-1;i>=0;i--){

let coin=coins[i];

let dx=player.x-coin.x;
let dy=player.y-coin.y;

if(Math.sqrt(dx*dx+dy*dy)<20){

score++;
coins.splice(i,1);
spawnCoin();

}

}

}

function draw(){

ctx.clearRect(0,0,600,400);

ctx.fillStyle="yellow";

for(let coin of coins){

ctx.beginPath();
ctx.arc(coin.x,coin.y,coin.size,0,Math.PI*2);
ctx.fill();

}

ctx.fillStyle="red";

for(let enemy of enemies){

ctx.fillRect(enemy.x,enemy.y,enemy.size,enemy.size);

}

ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.size,player.size);

ctx.fillStyle="white";
ctx.font="20px sans-serif";
ctx.fillText("Score: "+score,10,25);

if(gameOver){

ctx.font="40px sans-serif";
ctx.fillText("GAME OVER",200,200);

ctx.font="20px sans-serif";
ctx.fillText("Refresh to restart",230,240);

}

}

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
