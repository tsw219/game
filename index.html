<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>5つの街からの脱出</title>

<style>
body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#89f7fe,#66a6ff);
color:#333;
overflow:hidden;
}

/* 共通 */
.screen{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* タイトル */
#titleScreen{
display:flex;
}

.title{
font-size:42px;
font-weight:bold;
letter-spacing:2px;
text-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.startBtn{
margin-top:40px;
padding:15px 50px;
font-size:20px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff9a9e,#fad0c4);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.startBtn:hover{
transform:scale(1.1);
}

/* 街選択 */
#selectScreen{
display:flex;
overflow-y:auto;
padding:40px 0;
}

.city{
width:260px;
height:140px;
margin:15px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
transition:0.3s;
}

.city:hover{
transform:scale(1.07);
}

.c1{background:linear-gradient(#667eea,#764ba2);}
.c2{background:linear-gradient(#f6d365,#fda085);}
.c3{background:linear-gradient(#43cea2,#185a9d);}
.c4{background:linear-gradient(#fa709a,#fee140);}
.c5{background:linear-gradient(#30cfd0,#330867);}

/* ゲーム */
#gameScreen{
display:flex;
background:white;
}

/* 上部 */
#topUI{
position:absolute;
top:10px;
right:10px;
background:white;
padding:10px 15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* シーン */
#scene{
flex:1;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
}

/* テキスト */
#textbox{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:rgba(0,0,0,0.8);
color:white;
padding:20px;
cursor:pointer;
}

/* 入力 */
input{
padding:8px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- タイトル -->
<div id="titleScreen" class="screen">
<div class="title">5つの街からの脱出</div>
<button class="startBtn" onclick="goSelect()">START</button>
</div>

<!-- 選択 -->
<div id="selectScreen" class="screen">
<div class="city c1" onclick="startGame()">静止した住宅街</div>
<div class="city c2">音のない商店街</div>
<div class="city c3">閉ざされた学校</div>
<div class="city c4">記録が残らない街</div>
<div class="city c5">もう一人の自分の街</div>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="screen">

<div id="topUI">アイテム: <span id="items">なし</span></div>

<div id="scene"></div>

<div id="textbox" onclick="nextText()">クリックで進む</div>

</div>

<script>
let texts=[];
let index=0;
let items=[];

/* 画面切替 */
function goSelect(){
hideAll();
document.getElementById("selectScreen").style.display="flex";
}

function startGame(){
hideAll();
document.getElementById("gameScreen").style.display="flex";
startStory();
}

/* ストーリー */
function startStory(){
texts=[
"気づくと、誰もいない住宅街にいた。",
"すべての時計が止まっている。",
"正しい時間を見つけなければならない。"
];
index=0;
nextText();

loadScene();
}

/* テキスト */
function nextText(){
if(index < texts.length){
document.getElementById("textbox").innerText=texts[index];
index++;
}
}

/* シーン */
function loadScene(){
document.getElementById("scene").innerHTML=`
<div>
<p>壊れた時計</p>
<button onclick="getItem()">調べる</button>

<p>カレンダー</p>
<button onclick="hint('3月15日')">見る</button>

<p>日記</p>
<button onclick="hint('午後3時に外出')">読む</button>

<br><br>

<input id="ans" placeholder="時間(例:15)">
<button onclick="check()">入力</button>
</div>
`;
}

/* アイテム */
function getItem(){
if(!items.includes("電池")){
items.push("電池");
updateItems();
text("電池を入手した");
}
}

function updateItems(){
document.getElementById("items").innerText=items.join(",");
}

/* ヒント */
function hint(msg){
text(msg);
}

/* 判定 */
function check(){
let v=document.getElementById("ans").value;

if(v==="15"){
texts=["時計が動いた","出口が現れた","脱出成功"];
index=0;
nextText();
}else{
texts=["違う…","世界がリセットされた"];
index=0;
items=[];
updateItems();
nextText();
}
}

function text(t){
document.getElementById("textbox").innerText=t;
}

/* 共通 */
function hideAll(){
document.querySelectorAll(".screen").forEach(e=>e.style.display="none");
}
</script>

</body>
</html>
