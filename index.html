<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マッスル・クリッカー・デラックス</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --accent: #eccc68;
        }

        body {
            background-color: var(--secondary);
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #ui-container {
            text-align: center;
            z-index: 10;
        }

        .score-display {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(236, 204, 104, 0.5);
        }

        /* メインの叩く対象 */
        #target-muscle {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ff6b81, #ff4757);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            cursor: pointer;
            box-shadow: 0 10px 0 #b33939;
            transition: transform 0.05s;
            margin: 20px auto;
            position: relative;
        }

        #target-muscle:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 #b33939;
        }

        /* ショップエリア */
        .shop {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
        }

        .upgrade-btn {
            background: #57606f;
            border: none;
            padding: 15px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .upgrade-btn:hover:not(:disabled) { background: #747d8c; }
        .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* エフェクト */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fly 0.6s ease-out forwards;
            font-weight: bold;
            color: var(--accent);
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(2); opacity: 0; }
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="score-display" id="mp-display">0 MP</div>
        <div style="margin-bottom: 20px;">1 Click: <span id="power-display">1</span> MP</div>
        
        <div id="target-muscle" onclick="tap()">💪</div>

        <div class="shop">
            <button class="upgrade-btn" id="up-1" onclick="buy(0)">
                🥤 プロテイン<br>Cost: <span id="cost-0">10</span>
            </button>
            <button class="upgrade-btn" id="up-2" onclick="buy(1)">
                🏋️ ダンベル<br>Cost: <span id="cost-1">100</span>
            </button>
            <button class="upgrade-btn" id="up-3" onclick="buy(2)">
                🍗 ササミ定食<br>Cost: <span id="cost-2">500</span>
            </button>
            <button class="upgrade-btn" id="up-4" onclick="buy(3)">
                🏟 巨大ジム<br>Cost: <span id="cost-3">2000</span>
            </button>
        </div>
    </div>

    <script>
        let mp = 0;
        let power = 1;
        
        const upgrades = [
            { id: 0, name: "プロテイン", cost: 10, add: 1 },
            { id: 1, name: "ダンベル", cost: 100, add: 12 },
            { id: 2, name: "ササミ", cost: 500, add: 70 },
            { id: 3, name: "ジム", cost: 2000, add: 350 },
        ];

        function tap() {
            mp += power;
            updateDisplay();
            spawnParticle();
            
            // 画面を少し揺らす演出
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 100);
        }

        function buy(index) {
            const item = upgrades[index];
            if (mp >= item.cost) {
                mp -= item.cost;
                power += item.add;
                item.cost = Math.floor(item.cost * 1.5); // 次回から値上げ
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('mp-display').innerText = `${mp.toLocaleString()} MP`;
            document.getElementById('power-display').innerText = power.toLocaleString();
            
            upgrades.forEach((item, i) => {
                document.getElementById(`cost-${i}`).innerText = item.cost.toLocaleString();
                document.getElementById(`up-${i+1}`).disabled = mp < item.cost;
            });
        }

        function spawnParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = `+${power}`;
            // クリック位置の近くにランダムで表示
            p.style.left = (window.innerWidth / 2 + (Math.random() * 100 - 50)) + 'px';
            p.style.top = (window.innerHeight / 2 - 50) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        // 定期的にボタンの有効/無効をチェック
        setInterval(updateDisplay, 100);
    </script>
</body>
</html>
