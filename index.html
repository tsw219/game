<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Coin Game</title>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:#ffffff;
}

#menu{
position:absolute;
width:100%;
top:120px;
}

canvas{
background:#e9f5ff;
display:block;
margin:auto;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<div id="menu">

<h1>Coin Survival</h1>

<p>
矢印キーで移動<br>
コインを集めてスコアアップ<br>
敵に当たるとゲームオーバー<br>
Shiftでダッシュ
</p>

<input id="nameInput" placeholder="プレイヤー名（空欄でもOK）">

<br><br>

<button onclick="startGame()">START</button>

<h3>Top5</h3>
<div id="top5"></div>

</div>

<div id="ui" style="display:none">
Score: <span id="score">0</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let player
let enemies=[]
let coins=[]
let score=0
let running=false
let playerName=""

const keys={}

document.addEventListener("keydown",e=>{
keys[e.key]=true
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function startGame(){

const name=document.getElementById("nameInput").value.trim()

if(name===""){
playerName="Player"+Math.floor(Math.random()*1000)
}else{
playerName=name
}

player={
x:200,
y:200,
size:20,
speed:4
}

enemies=[]
coins=[]
score=0

spawnEnemy()
spawnCoin()

running=true

menu.style.display="none"
ui.style.display="block"

loop()

}

function spawnEnemy(){

enemies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:20,
speed:1.5
})

}

function spawnCoin(){

coins.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:10
})

}

function loop(){

if(!running)return

update()
draw()

requestAnimationFrame(loop)

}

function update(){

if(keys["ArrowUp"]) player.y-=player.speed
if(keys["ArrowDown"]) player.y+=player.speed
if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

for(const e of enemies){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

e.x+=dx/d*e.speed
e.y+=dy/d*e.speed

if(d<player.size+e.size){
gameOver()
}

}

for(let i=coins.length-1;i>=0;i--){

let c=coins[i]
let d=Math.hypot(player.x-c.x,player.y-c.y)

if(d<player.size+c.size){

coins.splice(i,1)

score++

spawnCoin()

if(score%5===0){
spawnEnemy()
}

}

}

scoreEl.textContent=score

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(const c of coins){

ctx.fillStyle="gold"
ctx.beginPath()
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()

}

for(const e of enemies){

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(e.x,e.y,e.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(e.x-5,e.y-5,3,0,Math.PI*2)
ctx.arc(e.x+5,e.y-5,3,0,Math.PI*2)
ctx.fill()

}

ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(player.x-5,player.y-5,3,0,Math.PI*2)
ctx.arc(player.x+5,player.y-5,3,0,Math.PI*2)
ctx.fill()

}

function gameOver(){

running=false

saveScore()

alert("Game Over\nScore:"+score)

location.reload()

}

function loadScores(){
return JSON.parse(localStorage.getItem("scores")||"{}")
}

function saveScore(){

let scores=loadScores()

if(!scores[playerName] || score>scores[playerName]){
scores[playerName]=score
}

localStorage.setItem("scores",JSON.stringify(scores))

}

function showTop5(){

let scores=loadScores()

let arr=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])
.slice(0,5)

top5.innerHTML=arr.map((s,i)=>`${i+1}. ${s[0]} : ${s[1]}`).join("<br>")

}

const scoreEl=document.getElementById("score")

showTop5()

</script>

</body>
</html>
