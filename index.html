<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shadow Maze</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:"Segoe UI", sans-serif;
    text-align:center;
}

#game {
    display:none;
}

canvas {
    background:#111;
    border:4px solid #555;
    margin-top:10px;
    box-shadow:0 0 20px #00ffff;
}

button {
    padding:10px 20px;
    font-size:16px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#00cccc;
    color:black;
}

button:hover {
    background:#00ffff;
}

#title,#gameover {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#gameover {
    display:none;
}

h1 {
    color:#00ffff;
}

#ui {
    margin-top:5px;
}
</style>
</head>

<body>

<!-- タイトル -->
<div id="title">
<h1>🌑 Shadow Maze 🌕</h1>

<p>
▶ ルール ◀<br><br>

・あなたは 青い光 です<br>
・ゴール（黄色）を目指そう<br><br>

・画面はだんだん暗くなります<br>
・敵はランダムに動きます<br><br>

⚠️ 敵は予測できません！<br>
「たまたま同じ方向に動いたら負け」です<br><br>

⚪ 白っぽい所＝安全<br>
⚫ 黒っぽい所＝危険<br><br>

進む方向は自分で判断しよう！
</p>

<button onclick="startGame()">スタート</button>
</div>


<!-- ゲーム -->
<div id="game">

<div id="ui">
レベル: <span id="levelText">1</span>
<button onclick="backToTitle()">タイトルへ</button>
</div>

<canvas id="canvas" width="500" height="500"></canvas>

</div>


<!-- ゲームオーバー -->
<div id="gameover">
<h1>💀 GAME OVER 💀</h1>

<button onclick="retry()">同じレベル</button>
<button onclick="backToTitle()">最初から</button>
</div>


<script>
// =======================
// 基本設定
// =======================

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const size = 25;
const cols = 20;
const rows = 20;

let player;
let goal;
let enemies = [];

let level = 1;
let darkness = 0;

let playing = false;


// =======================
// 効果音（WebAudio）
// =======================

const audio = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq,time){
    const osc = audio.createOscillator();
    const gain = audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value = freq;
    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audio.currentTime + time
    );

    osc.stop(audio.currentTime + time);
}

// =======================
// ゲーム開始
// =======================

function startGame(){
    document.getElementById("title").style.display="none";
    document.getElementById("game").style.display="block";

    level = 1;
    setup();
}


// =======================
// 初期化
// =======================

function setup(){

    player = {x:0,y:0};

    goal = {
        x:cols-1,
        y:rows-1
    };

    enemies = [];

    let enemyCount = level + 1;

    for(let i=0;i<enemyCount;i++){
        enemies.push({
            x:Math.floor(Math.random()*cols),
            y:Math.floor(Math.random()*rows),
            dirX:0,
            dirY:0
        });
    }

    darkness = 0;

    document.getElementById("levelText").textContent = level;

    playing = true;

    playSound(600,0.2);
}


// =======================
// キー操作
// =======================

document.addEventListener("keydown",e=>{

    if(!playing) return;

    let nx = player.x;
    let ny = player.y;

    if(e.key==="ArrowUp") ny--;
    if(e.key==="ArrowDown") ny++;
    if(e.key==="ArrowLeft") nx--;
    if(e.key==="ArrowRight") nx++;

    if(nx>=0 && nx<cols && ny>=0 && ny<rows){

        player.x = nx;
        player.y = ny;

        playSound(400,0.05);

        moveEnemies();
        check();
    }

});


// =======================
// 敵移動（ランダム）
// =======================

function moveEnemies(){

    enemies.forEach(e=>{

        let d = Math.floor(Math.random()*4);

        if(d===0){e.x++;}
        if(d===1){e.x--;}
        if(d===2){e.y++;}
        if(d===3){e.y--;}

        if(e.x<0) e.x=0;
        if(e.x>=cols) e.x=cols-1;
        if(e.y<0) e.y=0;
        if(e.y>=rows) e.y=rows-1;

    });

}


// =======================
// 判定
// =======================

function check(){

    // 敵と衝突
    for(let e of enemies){

        if(e.x===player.x && e.y===player.y){
            gameOver();
            return;
        }
    }

    // ゴール
    if(player.x===goal.x && player.y===goal.y){

        playSound(800,0.3);

        level++;
        setup();
    }

}


// =======================
// ゲームオーバー
// =======================

function gameOver(){

    playing = false;

    playSound(200,0.5);

    document.getElementById("gameover").style.display="flex";
}


// =======================
// 再挑戦
// =======================

function retry(){

    document.getElementById("gameover").style.display="none";

    setup();
}


// =======================
// タイトルへ
// =======================

function backToTitle(){

    playing = false;

    document.getElementById("game").style.display="none";
    document.getElementById("gameover").style.display="none";
    document.getElementById("title").style.display="flex";
}


// =======================
// 描画
// =======================

function draw(){

    ctx.clearRect(0,0,500,500);

    // 背景
    ctx.fillStyle="#222";
    ctx.fillRect(0,0,500,500);

    // ゴール
    ctx.fillStyle="yellow";
    ctx.fillRect(
        goal.x*size,
        goal.y*size,
        size,size
    );

    // プレイヤー
    ctx.fillStyle="#00ffff";
    ctx.fillRect(
        player.x*size,
        player.y*size,
        size,size
    );

    // 敵
    ctx.fillStyle="red";

    enemies.forEach(e=>{
        ctx.fillRect(
            e.x*size,
            e.y*size,
            size,size
        );
    });


    // 闇
    if(playing){

        darkness += 0.002 + level*0.0005;

        ctx.fillStyle = `rgba(0,0,0,${darkness})`;
        ctx.fillRect(0,0,500,500);

        if(darkness>=1){
            gameOver();
        }
    }


    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
