<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記憶パズル</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#container{
    text-align:center;
    width:360px;
}

#ranking{
    font-size:14px;
    color:#ffd54f;
    margin-top:10px;
    text-align:left;
}

input{
    padding:5px;
    margin-top:5px;
    width:150px;
}

.cell{
    width:55px;
    height:55px;
    background:#37474f;
    border-radius:8px;
    cursor:pointer;
    transition:0.1s;
}

.cell:active{
    transform:scale(0.9);
}

.cell.active{ background:#00e676; }
.cell.correct{ background:#2979ff; }
.cell.wrong{ background:#ff1744; }

#game{
    display:grid;
    gap:6px;
    justify-content:center;
}

#countdown{
    font-size:40px; /* ← 大きくした */
    color:#00e5ff;
    margin:10px;
}

#successText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:#00e676;
    display:none;
}

button{
    margin-top:10px;
    padding:8px 15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="container">

<div id="startScreen">
    <h1>記憶パズル</h1>

    名前：<input id="nameInput" placeholder="空欄OK">
    <div style="font-size:12px;">※空欄なら自動でPlayer名</div>

    <br>
    <button onclick="startGame()">スタート</button>

    <div id="ranking"></div>
</div>

<div id="gameScreen" style="display:none;">
    <h2 id="level"></h2>
    <div id="info"></div>
    <div id="countdown"></div>
    <div id="game"></div>
</div>

<div id="gameOver" style="display:none;">
    <h1>ゲームオーバー</h1>
    <p id="finalScore"></p>
    <button onclick="goToStart()">最初に戻る</button>
</div>

<div id="successText">成功！</div>

</div>

<script>
let size = 3;
let level = 1;
let pattern = [];
let player = [];
let showing = true;
let countdownTimer;

let scores = JSON.parse(localStorage.getItem("ranking") || "[]");

// 音
function playSound(freq, time){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.start();
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time);
    osc.stop(ctx.currentTime + time);
}

// ランキング表示
function updateRanking(){
    let text = "🏆 Ranking<br>";
    scores.slice(0,5).forEach((s,i)=>{
        text += `${i+1}. ${s.name} : Lv ${s.score}<br>`;
    });
    document.getElementById("ranking").innerHTML = text;
}

// 名前取得（完全修正版）
function getPlayerName(){
    let input = document.getElementById("nameInput").value.trim();

    // 空欄なら確実にPlayer番号生成
    if(input === ""){
        let num = 1;
        while(scores.some(s => s.name === "Player" + num)){
            num++;
        }
        return "Player" + num;
    }

    // 同名チェック
    if(scores.some(s => s.name === input)){
        alert("同じ名前があります！");
        return null;
    }

    return input;
}

function saveScore(name, score){
    scores.push({name, score});
    scores.sort((a,b)=>b.score-a.score);
    localStorage.setItem("ranking", JSON.stringify(scores));
}

// ===== ゲーム =====

let playerName = "";

function startGame(){
    let name = getPlayerName();
    if(name === null) return;

    playerName = name;

    document.getElementById("startScreen").style.display="none";
    document.getElementById("gameScreen").style.display="block";

    level = 1;
    size = 3;

    updateGame();
}

function updateGame(){
    player = [];
    pattern = [];

    document.getElementById("level").innerText = "Level " + level;
    document.getElementById("info").innerText = "覚えて！";

    const game = document.getElementById("game");
    game.innerHTML = "";
    game.style.gridTemplateColumns = `repeat(${size},55px)`;

    for(let i=0;i<size*size;i++){
        const div = document.createElement("div");
        div.classList.add("cell");
        div.onclick = ()=>clickCell(i,div);
        game.appendChild(div);
    }

    let count = Math.min(3 + Math.floor(level/2), size*size-1);
    while(pattern.length < count){
        let r = Math.floor(Math.random()*size*size);
        if(!pattern.includes(r)) pattern.push(r);
    }

    showPattern();
}

function showPattern(){
    showing = true;
    const cells = document.querySelectorAll(".cell");

    pattern.forEach(i=>cells[i].classList.add("active"));

    let time = Math.min(1800 + level*80, 3500);
    let start = Date.now();

    clearInterval(countdownTimer);
    countdownTimer = setInterval(()=>{
        let remain = Math.max(0, time-(Date.now()-start));
        document.getElementById("countdown").innerText=(remain/1000).toFixed(2);
    },10);

    setTimeout(()=>{
        cells.forEach(c=>c.classList.remove("active"));
        showing=false;
        document.getElementById("info").innerText="再現してください";
        document.getElementById("countdown").innerText="";
    },time);
}

function clickCell(i,div){
    if(showing) return;
    if(player.includes(i)) return;

    playSound(400,0.1);

    player.push(i);
    div.classList.add("correct");

    if(!pattern.includes(i)){
        div.classList.add("wrong");
        playSound(150,0.3);
        gameOver();
        return;
    }

    if(player.length === pattern.length){
        success();
    }
}

function success(){
    playSound(800,0.2);

    const text = document.getElementById("successText");
    text.style.display="block";

    setTimeout(()=>{ text.style.display="none"; },600);

    level++;

    if(level % 3 === 0){
        size = Math.min(size+1,7);
    }

    setTimeout(updateGame,800);
}

function gameOver(){
    document.getElementById("gameScreen").style.display="none";
    document.getElementById("gameOver").style.display="block";

    document.getElementById("finalScore").innerText =
        playerName + " のスコア: Lv " + level;

    saveScore(playerName, level);
    updateRanking();
}

function goToStart(){
    document.getElementById("gameOver").style.display="none";
    document.getElementById("startScreen").style.display="block";
    updateRanking();
}

updateRanking();
</script>

</body>
</html>
