<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Coin Survivor</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(#6ec6ff,#dff7ff);
}

#ui{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-weight:bold;
font-size:22px;
text-shadow:2px 2px 4px white;
}

#scoreBox{
background:rgba(255,255,255,0.85);
display:inline-block;
padding:10px 30px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.3);
max-width:500px;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:15px;
background:#ffcc00;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#ffdd33;
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="ui">
<div id="scoreBox">
コイン: <span id="score">0</span>　
ハイスコア: <span id="high">0</span>
</div>
</div>

<div id="menu">
<h2>コインサバイバー</h2>

<p>
😀 あなた<br>
😈 敵（当たるとゲームオーバー）<br>
🟡 ノーマルコイン = 1点<br>
💜 レアコイン = 3点<br>
💎 超レアコイン = 5点
</p>

<p>
コインを集めてスコアを伸ばそう！<br>
<strong>10コインごとに敵が速くなる！</strong>
</p>

<button onclick="startGame()">スタート</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let W,H

function resize(){
W=window.innerWidth
H=window.innerHeight
canvas.width=W
canvas.height=H
}
resize()
window.addEventListener("resize",resize)

let player
let coins=[]
let enemies=[]

let score=0
let high=localStorage.getItem("coinHigh")||0

document.getElementById("high").innerText=high

let game=false
let speedLevel=1

function startGame(){

document.getElementById("menu").style.display="none"

player={
x:W/2,
y:H/2,
size:30,
speed:4
}

coins=[]
enemies=[]

score=0
speedLevel=1

spawnCoin()
spawnEnemy()

game=true
loop()

}

function spawnCoin(){

let type=Math.random()

let value=1
let color="gold"

if(type<0.1){
value=5
color="cyan"
}
else if(type<0.3){
value=3
color="purple"
}

let x=Math.random()*(W-60)+30
let y=Math.random()*(H-120)+90

coins.push({x,y,value,color,size:28})

}

function spawnEnemy(){

let x=Math.random()*W
let y=Math.random()*H

enemies.push({
x,y,
size:30,
speed:1.3+speedLevel*0.3
})

}

let keys={}

window.addEventListener("keydown",e=>keys[e.key]=true)
window.addEventListener("keyup",e=>keys[e.key]=false)

function update(){

if(keys["ArrowUp"]||keys["w"]) player.y-=player.speed
if(keys["ArrowDown"]||keys["s"]) player.y+=player.speed
if(keys["ArrowLeft"]||keys["a"]) player.x-=player.speed
if(keys["ArrowRight"]||keys["d"]) player.x+=player.speed

player.x=Math.max(player.size,Math.min(W-player.size,player.x))
player.y=Math.max(player.size+50,Math.min(H-player.size,player.y))

for(let e of enemies){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

e.x+=dx/d*e.speed
e.y+=dy/d*e.speed

if(d<player.size){
gameOver()
}

}

for(let i=coins.length-1;i>=0;i--){

let c=coins[i]

let d=Math.hypot(player.x-c.x,player.y-c.y)

if(d<player.size){

score+=c.value

document.getElementById("score").innerText=score

coins.splice(i,1)

spawnCoin()

if(score%10===0){

speedLevel++

spawnEnemy()

}

}

}

}

function draw(){

ctx.clearRect(0,0,W,H)

for(let c of coins){

ctx.beginPath()
ctx.fillStyle=c.color
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()

}

for(let e of enemies){

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(e.x,e.y,e.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(e.x-8,e.y-5,5,0,Math.PI*2)
ctx.arc(e.x+8,e.y-5,5,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(e.x-8,e.y-5,2,0,Math.PI*2)
ctx.arc(e.x+8,e.y-5,2,0,Math.PI*2)
ctx.fill()

}

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(player.x-8,player.y-5,3,0,Math.PI*2)
ctx.arc(player.x+8,player.y-5,3,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(player.x,player.y+3,6,0,Math.PI)
ctx.stroke()

}

function loop(){

if(!game) return

update()
draw()

requestAnimationFrame(loop)

}

function gameOver(){

game=false

if(score>high){
high=score
localStorage.setItem("coinHigh",high)
}

document.getElementById("high").innerText=high

document.getElementById("menu").innerHTML=
"<h2>ゲームオーバー</h2>"+
"<p>スコア: "+score+"</p>"+
"<button onclick='startGame()'>もう一回</button>"

document.getElementById("menu").style.display="block"

}

</script>

</body>
</html>
