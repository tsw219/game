<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記憶パズル</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* コンテナ固定 */
#container{
    position:relative;
    width:360px;
    height:520px; /* ←固定が超重要 */
}

/* 画面を重ねる */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;

    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s;
}

.active{
    opacity:1;
    pointer-events:auto;
}

/* ゲーム */
#game{
    width:350px;
    height:350px;
    margin:0 auto;
    display:grid;
    gap:6px;
}

.cell{
    background:#37474f;
    border-radius:8px;
    cursor:pointer;
}
.cell.active{background:#00e676;}
.cell.correct{background:#2979ff;}
.cell.wrong{background:#ff1744;}

#countdown{
    font-size:40px;
    text-align:center;
}

/* 成功 */
#successText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    color:#00e676;
    display:none;
}
</style>
</head>

<body>

<div id="container">

<!-- スタート -->
<div id="startScreen" class="screen active">
<h1>記憶パズル</h1>

名前：<input id="nameInput" placeholder="空欄OK"><br>
<button onclick="startGame()">スタート</button>

<div id="ranking"></div>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="screen">
<h2 id="level"></h2>
<div id="countdown"></div>
<div id="game"></div>
</div>

<!-- 終了 -->
<div id="gameOver" class="screen">
<h1>ゲームオーバー</h1>
<p id="finalScore"></p>
<button onclick="goStart()">戻る</button>
</div>

<div id="successText">成功！</div>

</div>

<script>
let size=3,level=1,pattern=[],player=[],showing=true;
let scores=JSON.parse(localStorage.getItem("ranking")||"[]");
let playerName="";

function showScreen(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function updateRanking(){
 let t="🏆<br>";
 scores.slice(0,5).forEach((s,i)=>t+=`${i+1}.${s.name}:Lv${s.score}<br>`);
 document.getElementById("ranking").innerHTML=t;
 localStorage.setItem("ranking",JSON.stringify(scores));
}

function getName(){
 let v=document.getElementById("nameInput").value.trim();
 if(v===""){
  let n=1;while(scores.some(s=>s.name==="Player"+n))n++;
  return"Player"+n;
 }
 if(scores.some(s=>s.name===v)){alert("同じ名前");return null;}
 return v;
}

function startGame(){
 let n=getName(); if(!n)return;
 playerName=n;
 showScreen("gameScreen");
 level=1; size=3;
 updateGame();
}

function updateGame(){
 player=[];pattern=[];
 document.getElementById("level").innerText="Level "+level;

 let game=document.getElementById("game");
 game.innerHTML="";
 game.style.gridTemplateColumns=`repeat(${size},1fr)`;

 for(let i=0;i<size*size;i++){
  let d=document.createElement("div");
  d.className="cell";
  d.onclick=()=>clickCell(i,d);
  game.appendChild(d);
 }

 let count=Math.min(3+Math.floor(level/2),size*size-1);
 while(pattern.length<count){
  let r=Math.floor(Math.random()*size*size);
  if(!pattern.includes(r))pattern.push(r);
 }

 showPattern();
}

function showPattern(){
 showing=true;
 let cells=document.querySelectorAll(".cell");

 pattern.forEach(i=>cells[i].classList.add("active"));

 setTimeout(()=>{
  cells.forEach(c=>c.classList.remove("active"));
  showing=false;
 },1500);
}

function clickCell(i,d){
 if(showing||player.includes(i))return;

 player.push(i);
 d.classList.add("correct");

 if(!pattern.includes(i)){
  gameOver();
  return;
 }

 if(player.length===pattern.length){
  showSuccess();
 }
}

function showSuccess(){
 let t=document.getElementById("successText");
 t.style.display="block";

 setTimeout(()=>{
  t.style.display="none";
  level++;
  if(level%3===0) size++;
  updateGame();
 },600);
}

function gameOver(){
 document.getElementById("finalScore").innerText=playerName+" Lv "+level;

 scores.push({name:playerName,score:level});
 scores.sort((a,b)=>b.score-a.score);

 showScreen("gameOver");
 updateRanking();
}

function goStart(){
 showScreen("startScreen");
}

updateRanking();
</script>

</body>
</html>
