```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(#87ceeb,#4aa3ff);
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
color:black;
font-size:22px;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

button{
font-size:20px;
padding:10px 25px;
border:none;
border-radius:10px;
background:#ffcc00;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ffd84d;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui"></div>

<div id="menu">
<h2>Coin Survival</h2>
<p>
矢印キーで移動<br>
コインを集める<br>
敵に当たるとゲームオーバー
</p>
<button onclick="startGame()">START</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let w=window.innerWidth;
let h=window.innerHeight;

canvas.width=w;
canvas.height=h;

window.onresize=()=>{
w=window.innerWidth;
h=window.innerHeight;
canvas.width=w;
canvas.height=h;
}

let player,enemies,coins,score,highScore=0,gameOver=false;
let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function startGame(){

document.getElementById("menu").style.display="none";

player={x:w/2,y:h/2,size:25,speed:4};
enemies=[];
coins=[];
score=0;
gameOver=false;

spawnCoin();

}

function restartGame(){

player.x=w/2;
player.y=h/2;

enemies=[];
coins=[];

score=0;
gameOver=false;

spawnCoin();

}

function spawnEnemy(){

let side=Math.floor(Math.random()*4);
let enemy={size:26,speed:1.5};

if(side===0){enemy.x=0;enemy.y=Math.random()*h;}
if(side===1){enemy.x=w;enemy.y=Math.random()*h;}
if(side===2){enemy.x=Math.random()*w;enemy.y=0;}
if(side===3){enemy.x=Math.random()*w;enemy.y=h;}

enemies.push(enemy);

}

function spawnCoin(){

coins.push({
x:Math.random()*(w-40)+20,
y:Math.random()*(h-40)+20,
size:12
});

}

let enemyTimer=0;

function update(){

if(gameOver)return;

if(keys["ArrowUp"])player.y-=player.speed;
if(keys["ArrowDown"])player.y+=player.speed;
if(keys["ArrowLeft"])player.x-=player.speed;
if(keys["ArrowRight"])player.x+=player.speed;

player.x=Math.max(0,Math.min(w-player.size,player.x));
player.y=Math.max(0,Math.min(h-player.size,player.y));

enemyTimer++;

if(enemyTimer>70){
spawnEnemy();
enemyTimer=0;
}

for(let enemy of enemies){

let dx=player.x-enemy.x;
let dy=player.y-enemy.y;
let dist=Math.sqrt(dx*dx+dy*dy);

enemy.x+=dx/dist*enemy.speed;
enemy.y+=dy/dist*enemy.speed;

if(dist<25){
gameOver=true;

if(score>highScore){
highScore=score;
}

}

}

for(let i=coins.length-1;i>=0;i--){

let coin=coins[i];

let dx=player.x-coin.x;
let dy=player.y-coin.y;

if(Math.sqrt(dx*dx+dy*dy)<25){

score++;
coins.splice(i,1);
spawnCoin();

}

}

}

function drawPlayer(){

ctx.fillStyle="#4fc3f7";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x-7,player.y-5,4,0,Math.PI*2);
ctx.arc(player.x+7,player.y-5,4,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(player.x-7,player.y-5,2,0,Math.PI*2);
ctx.arc(player.x+7,player.y-5,2,0,Math.PI*2);
ctx.fill();

}

function drawEnemy(enemy){

ctx.fillStyle="#ff4d4d";
ctx.beginPath();
ctx.arc(enemy.x,enemy.y,13,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(enemy.x-4,enemy.y-3,3,0,Math.PI*2);
ctx.arc(enemy.x+4,enemy.y-3,3,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(enemy.x-4,enemy.y-3,1.5,0,Math.PI*2);
ctx.arc(enemy.x+4,enemy.y-3,1.5,0,Math.PI*2);
ctx.fill();

}

function drawCoin(coin){

ctx.fillStyle="#ffd700";
ctx.beginPath();
ctx.arc(coin.x,coin.y,coin.size,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="#fff4b3";
ctx.lineWidth=2;
ctx.stroke();

}

function draw(){

ctx.clearRect(0,0,w,h);

for(let coin of coins){
drawCoin(coin);
}

for(let enemy of enemies){
drawEnemy(enemy);
}

drawPlayer();

ctx.fillStyle="black";
ctx.font="24px sans-serif";

document.getElementById("ui").innerHTML=
"Score: "+score+"<br>High Score: "+highScore;

if(gameOver){

ctx.font="50px sans-serif";
ctx.fillText("GAME OVER",w/2-150,h/2);

ctx.font="25px sans-serif";
ctx.fillText("Press R to Restart",w/2-100,h/2+40);

}

}

document.addEventListener("keydown",e=>{
if(e.key==="r"&&gameOver){
restartGame();
}
});

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
