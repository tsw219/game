<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mind Trap</title>

<style>
body {
    background: radial-gradient(#111, #000);
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

#game {
    width: 420px;
    margin: 30px auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.block {
    width: 200px;
    height: 200px;
    background: #222;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.block.active {
    background: gold;
    box-shadow: 0 0 30px gold;
}

#panel {
    font-size: 20px;
    margin: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🧠 Mind Trap</h1>

<div id="panel">
    Level: <span id="level">0</span>
</div>

<div id="game">
    <div class="block" data-id="0"></div>
    <div class="block" data-id="1"></div>
    <div class="block" data-id="2"></div>
    <div class="block" data-id="3"></div>
</div>

<button id="start">START</button>

<script>
const blocks = document.querySelectorAll(".block");
const levelText = document.getElementById("level");
const startBtn = document.getElementById("start");

let pattern = [];
let user = [];
let level = 0;
let playing = false;

// 音
const beep = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YRAAAAAA");

// ランダム
function randomBlock() {
    return Math.floor(Math.random() * 4);
}

// 光る
function flash(id) {
    blocks[id].classList.add("active");
    beep.play();

    setTimeout(() => {
        blocks[id].classList.remove("active");
    }, 400);
}

// パターン再生
async function playPattern() {
    playing = true;

    for (let id of pattern) {
        await new Promise(r => setTimeout(r, 600));
        flash(id);
    }

    playing = false;
}

// スタート
function startGame() {
    pattern = [];
    user = [];
    level = 0;
    next();
}

// 次のレベル
function next() {
    user = [];
    level++;
    levelText.textContent = level;

    pattern.push(randomBlock());

    setTimeout(playPattern, 500);
}

// クリック
blocks.forEach(b => {
    b.addEventListener("click", () => {

        if (playing) return;

        const id = Number(b.dataset.id);

        flash(id);
        user.push(id);

        check();
    });
});

// 判定
function check() {
    const i = user.length - 1;

    if (user[i] !== pattern[i]) {
        gameOver();
        return;
    }

    if (user.length === pattern.length) {
        setTimeout(next, 700);
    }
}

// 終了
function gameOver() {
    alert("GAME OVER\nLevel: " + level);
    playing = true;
}

startBtn.onclick = startGame;
</script>

</body>
</html>
