<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記憶パズル</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#container{
    text-align:center;
    width:320px;
}

h1{
    margin-bottom:10px;
}

#level{
    font-size:20px;
}

#highscore{
    font-size:16px;
    margin-bottom:5px;
    color:#ffd54f;
}

#info{
    margin:10px;
}

#countdown{
    font-size:28px;
    color:#00e5ff;
}

#game{
    display:grid;
    gap:6px;
    justify-content:center;
    margin-top:10px;
}

.cell{
    width:55px;
    height:55px;
    background:#37474f;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.cell.active{
    background:#00e676;
    box-shadow:0 0 10px #00e676;
}

.cell.correct{
    background:#2979ff;
}

.cell.wrong{
    background:#ff1744;
}

button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#ff9800;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ffa726;
}

#gameOver{
    display:none;
}
</style>
</head>

<body>

<div id="container">

<!-- スタート画面 -->
<div id="startScreen">
    <h1>記憶パズル</h1>
    <p>
        光ったマスを覚えて再現しよう！<br>
        レベルが上がるほど難しくなる
    </p>
    <button onclick="startGame()">スタート</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen" style="display:none;">
    <h1>記憶パズル</h1>
    <div id="highscore">High Score: 1</div>
    <div id="level">Level 1</div>
    <div id="info">覚えて！</div>
    <div id="countdown"></div>
    <div id="game"></div>
</div>

<!-- ゲームオーバー -->
<div id="gameOver">
    <h1>ゲームオーバー</h1>
    <p id="finalScore"></p>
    <button onclick="goToStart()">最初に戻る</button>
</div>

</div>

<script>
let size = 3;
let level = 1;
let pattern = [];
let player = [];
let showing = true;
let countdownTimer;

let highScore = localStorage.getItem("memoryHighScore") || 1;
document.getElementById("highscore").innerText = "High Score: " + highScore;

function getShowTime(){
    // レベルで増えるが上限あり
    return Math.min(1500 + level*120, 4000);
}

function startGame(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";

    player = [];
    pattern = [];

    document.getElementById("level").innerText = "Level " + level;
    document.getElementById("highscore").innerText = "High Score: " + highScore;

    const game = document.getElementById("game");
    game.innerHTML = "";
    game.style.gridTemplateColumns = `repeat(${size}, 55px)`;

    for(let i=0;i<size*size;i++){
        const div = document.createElement("div");
        div.classList.add("cell");
        div.onclick = () => clickCell(i, div);
        game.appendChild(div);
    }

    let count = Math.floor(size*size/3);
    while(pattern.length < count){
        let r = Math.floor(Math.random()*size*size);
        if(!pattern.includes(r)) pattern.push(r);
    }

    showPattern();
}

function showPattern(){
    showing = true;
    document.getElementById("info").innerText = "覚えて！";

    const cells = document.querySelectorAll(".cell");

    pattern.forEach(i => {
        cells[i].classList.add("active");
    });

    let time = getShowTime();
    let start = Date.now();

    clearInterval(countdownTimer);
    countdownTimer = setInterval(()=>{
        let elapsed = Date.now() - start;
        let remaining = Math.max(0, time - elapsed);

        document.getElementById("countdown").innerText = (remaining/1000).toFixed(2);

        if(remaining <= 0){
            clearInterval(countdownTimer);
        }
    }, 10);

    setTimeout(() => {
        cells.forEach(c => c.classList.remove("active"));
        showing = false;
        document.getElementById("info").innerText = "再現してください";
        document.getElementById("countdown").innerText = "";
    }, time);
}

function clickCell(index, div){
    if(showing) return;
    if(player.includes(index)) return;

    player.push(index);
    div.classList.add("correct");

    if(!pattern.includes(index)){
        div.classList.add("wrong");
        gameOver();
        return;
    }

    if(player.length === pattern.length){
        level++;
        size = Math.min(3 + Math.floor(level/2), 7);

        setTimeout(startGame,800);
    }
}

function gameOver(){
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("gameOver").style.display = "block";

    document.getElementById("finalScore").innerText = "到達レベル: " + level;

    if(level > highScore){
        highScore = level;
        localStorage.setItem("memoryHighScore", highScore);
    }
}

function goToStart(){
    level = 1;
    size = 3;
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("startScreen").style.display = "block";
}
</script>

</body>
</html>
