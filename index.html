<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ループ脱出ゲーム</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

#menu, #game, #clear {
    display: none;
    padding: 20px;
}

h1 {
    color: #4fc3f7;
}

button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}

#map {
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(7, 50px);
    grid-template-rows: repeat(7, 50px);
    gap: 2px;
}

.cell {
    width: 50px;
    height: 50px;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
}

.player {
    background: #4caf50;
}

.goal {
    background: gold;
}

.info {
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- メニュー画面 -->
<div id="menu">
    <h1>🔁 ループ脱出ゲーム</h1>

    <p>
        同じ1日を繰り返す世界から脱出しよう。<br>
        違和感を見つけて行動せよ。
    </p>

    <p>
        🎮 操作：矢印キーで移動
    </p>

    <h3>舞台を選択</h3>

    <button onclick="startGame('school')">🏫 不思議な学校</button>
    <button onclick="startGame('house')">🏠 ループハウス</button>
    <button onclick="startGame('mall')">🛍 無限モール</button>
    <button onclick="startGame('library')">📚 夢の図書館</button>
    <button onclick="startGame('park')">🌌 時空公園</button>
</div>

<!-- ゲーム画面 -->
<div id="game">

    <h2 id="stageName"></h2>

    <div>ループ回数：<span id="loop">1</span></div>

    <div id="map"></div>

    <div class="info" id="message"></div>

    <button onclick="resetLoop()">🔄 やり直す</button>
</div>

<!-- クリア画面 -->
<div id="clear">
    <h1>🎉 脱出成功！</h1>

    <p>
        ループから抜け出した！
    </p>

    <button onclick="backMenu()">🏠 メニューへ</button>
</div>

<script>

const menu = document.getElementById("menu");
const game = document.getElementById("game");
const clear = document.getElementById("clear");

const mapDiv = document.getElementById("map");
const loopSpan = document.getElementById("loop");
const stageName = document.getElementById("stageName");
const message = document.getElementById("message");

let player = { x: 3, y: 3 };
let loopCount = 1;
let hasStar = false;
let currentStage = "";

const stages = {
    school: "🏫 不思議な学校",
    house: "🏠 ループハウス",
    mall: "🛍 無限モール",
    library: "📚 夢の図書館",
    park: "🌌 時空公園"
};

function showMenu() {
    menu.style.display = "block";
    game.style.display = "none";
    clear.style.display = "none";
}

function startGame(stage) {
    currentStage = stage;
    stageName.textContent = stages[stage];

    loopCount = 1;
    hasStar = false;

    resetPlayer();

    menu.style.display = "none";
    game.style.display = "block";
    clear.style.display = "none";

    update();
}

function resetPlayer() {
    player.x = 3;
    player.y = 3;
}

function resetLoop() {
    loopCount++;
    hasStar = false;

    resetPlayer();
    update();
}

function update() {

    loopSpan.textContent = loopCount;

    mapDiv.innerHTML = "";

    let starPos = null;

    // 3回目にだけ出現
    if (loopCount === 3 && !hasStar) {
        starPos = { x: 1, y: 1 };
    }

    for (let y = 0; y < 7; y++) {
        for (let x = 0; x < 7; x++) {

            const cell = document.createElement("div");
            cell.className = "cell";

            if (x === player.x && y === player.y) {
                cell.classList.add("player");
                cell.textContent = "🙂";
            }

            else if (starPos && x === starPos.x && y === starPos.y) {
                cell.classList.add("goal");
                cell.textContent = "★";
            }

            mapDiv.appendChild(cell);
        }
    }

    if (loopCount < 3) {
        message.textContent =
            "何か違和感がある気がする…。";
    }
    else if (!hasStar) {
        message.textContent =
            "あの★が気になる…。";
    }
    else {
        message.textContent =
            "出口が見えてきた…。";
    }
}

document.addEventListener("keydown", e => {

    if (game.style.display !== "block") return;

    switch (e.key) {

        case "ArrowUp":
            if (player.y > 0) player.y--;
            break;

        case "ArrowDown":
            if (player.y < 6) player.y++;
            break;

        case "ArrowLeft":
            if (player.x > 0) player.x--;
            break;

        case "ArrowRight":
            if (player.x < 6) player.x++;
            break;
    }

    checkEvent();
    update();
});

function checkEvent() {

    // ★取得
    if (loopCount === 3 &&
        player.x === 1 &&
        player.y === 1 &&
        !hasStar) {

        hasStar = true;
        message.textContent = "★を手に入れた！";
    }

    // 脱出
    if (hasStar &&
        player.x === 6 &&
        player.y === 6) {

        game.style.display = "none";
        clear.style.display = "block";
    }
}

function backMenu() {
    showMenu();
}

showMenu();

</script>

</body>
</html>
