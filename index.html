<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>架空都市からの脱出</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#cfefff;
}

/* 共通 */
.hidden{display:none;}

/* ホーム */
#menu{
text-align:center;
padding:20px;
}

.city{
width:300px;
margin:10px auto;
padding:20px;
background:#4facfe;
color:white;
border-radius:10px;
cursor:pointer;
}

/* ゲーム */
#game{
height:100vh;
display:none;
position:relative;
}

/* 上UI */
#top{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
}

/* マップ */
#map{
width:100%;
height:70%;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
}

/* 操作 */
#controls{
position:absolute;
bottom:130px;
width:100%;
text-align:center;
}

/* テキスト */
#text{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:black;
color:white;
padding:15px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- ホーム -->
<div id="menu">
<h1>5つの街からの脱出</h1>

<p>※街をクリックして開始</p>

<div class="city" onclick="startGame()">静止した住宅街</div>
<div class="city">（未実装）</div>
<div class="city">（未実装）</div>
<div class="city">（未実装）</div>
<div class="city">（未実装）</div>
</div>

<!-- ゲーム -->
<div id="game">

<div id="top">
<button onclick="goMenu()">戻る</button><br>
アイテム: <span id="items">なし</span>
</div>

<div id="map"></div>

<div id="controls"></div>

<div id="text" onclick="nextText()">クリックで進む</div>

</div>

<script>
let texts=[];
let i=0;
let location="street";
let items=[];

/* 開始 */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

texts=[
"ここは誰もいない街…",
"探索して時間の手がかりを探そう",
"画面下はテキスト、上は操作できる"
];
i=0;
nextText();

showStreet();
}

/* テキスト */
function nextText(){
if(i < texts.length){
document.getElementById("text").innerText=texts[i];
i++;
}
}

/* 街 */
function showStreet(){
location="street";

document.getElementById("map").innerHTML="住宅街（道）";

document.getElementById("controls").innerHTML=`
<button onclick="enterHouse()">家に入る</button>
<button onclick="enterShop()">店に入る</button>
`;
}

/* 家 */
function enterHouse(){
location="house";

document.getElementById("map").innerHTML="家の中";

document.getElementById("controls").innerHTML=`
<button onclick="getItem('電池')">机を調べる</button>
<button onclick="showStreet()">外に出る</button>
`;

setText("机の上に何かある");
}

/* 店 */
function enterShop(){
location="shop";

document.getElementById("map").innerHTML="店の中";

document.getElementById("controls").innerHTML=`
<button onclick="hint('3月15日')">カレンダー</button>
<button onclick="hint('午後3時に外出')">メモ</button>
<button onclick="solve()">時計を調べる</button>
<button onclick="showStreet()">外に出る</button>
`;
}

/* アイテム */
function getItem(item){
if(!items.includes(item)){
items.push(item);
updateItems();
setText(item+"を入手");
}
}

function updateItems(){
document.getElementById("items").innerText=items.join(",");
}

/* ヒント */
function hint(msg){
setText(msg);
}

/* 謎 */
function solve(){
let ans = prompt("時間は？（数字）");

if(ans==="15"){
texts=["時計が動いた","出口発見","クリア"];
i=0;
nextText();

setTimeout(goMenu,2000);

}else{
setText("違う…");
}
}

/* テキスト */
function setText(t){
document.getElementById("text").innerText=t;
}

/* 戻る */
function goMenu(){
document.getElementById("game").style.display="none";
document.getElementById("menu").style.display="block";
items=[];
updateItems();
}
</script>

</body>
</html>
