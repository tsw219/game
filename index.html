<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プレミアムガチャ・シミュレーター</title>
    <style>
        :root {
            --rarity-ssr: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            --rarity-sr: #ffd700;
            --rarity-r: #c0c0c0;
            --bg-color: #1a1a2e;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 { margin-top: 20px; text-shadow: 0 0 10px #4ecca3; }

        /* ガチャ画面全体 */
        #gacha-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }

        /* 結果表示エリア */
        #result-display {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 30px;
            min-height: 250px;
        }

        /* カードのスタイル */
        .card {
            width: 100%;
            aspect-ratio: 2/3;
            background: #252a41;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .card.show { transform: scale(1); }

        /* レアリティ別の色 */
        .rarity-SSR { background: var(--rarity-ssr); color: #fff; text-shadow: 0 0 5px black; animation: shine 2s infinite; }
        .rarity-SR { background: var(--rarity-sr); color: #333; }
        .rarity-R { background: var(--rarity-r); color: #333; }

        @keyframes shine {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
            100% { filter: brightness(1); }
        }

        /* ボタン */
        .controls { margin-top: 40px; }
        button {
            background: #4ecca3;
            border: none;
            padding: 15px 30px;
            color: #1a1a2e;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
        }
        button:hover { background: #45b393; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #444; cursor: not-allowed; }

        /* 演出用オーバーレイ */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-size: 3rem;
            font-style: italic;
        }

        .shutter {
            animation: shutterEffect 1s ease-in-out;
        }

        @keyframes shutterEffect {
            0% { opacity: 0; }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>PREMIUM GACHA</h1>
    
    <div id="gacha-container">
        <div id="status">石を消費してガチャを回そう！</div>
        
        <div id="result-display">
            </div>

        <div class="controls">
            <button id="btn-single" onclick="pullGacha(1)">1回召喚</button>
            <button id="btn-multi" onclick="pullGacha(10)">10回召喚</button>
        </div>
    </div>

    <div id="overlay">演出中...</div>

    <script>
        const resultDisplay = document.getElementById('result-display');
        const overlay = document.getElementById('overlay');
        const btnSingle = document.getElementById('btn-single');
        const btnMulti = document.getElementById('btn-multi');

        // ガチャの中身データ
        const characterPool = {
            SSR: ["勇者アルフレッド", "聖女エルザ", "魔王ゼノン"],
            SR: ["騎士団長", "暗殺者シノ", "司祭ミレーヌ", "鉄壁の重装兵"],
            R: ["新米戦士", "村人A", "見習い魔法使い", "スライム殺し", "ただの棒"]
        };

        function pullGacha(count) {
            // UIのリセット
            resultDisplay.innerHTML = '';
            btnSingle.disabled = true;
            btnMulti.disabled = true;

            // 演出開始
            overlay.style.display = 'flex';
            overlay.classList.add('shutter');

            setTimeout(() => {
                overlay.style.display = 'none';
                overlay.classList.remove('shutter');
                
                // ガチャ実行
                const results = [];
                for (let i = 0; i < count; i++) {
                    results.push(roll());
                }

                // カードを1枚ずつ順番に表示
                results.forEach((res, index) => {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = `card rarity-${res.rarity} show`;
                        card.innerHTML = `<span>${res.rarity}<br><small style="font-size:0.6rem">${res.name}</small></span>`;
                        resultDisplay.appendChild(card);

                        // 全て表示し終わったらボタンを戻す
                        if (index === results.length - 1) {
                            btnSingle.disabled = false;
                            btnMulti.disabled = false;
                        }
                    }, index * 150); // 150ms間隔で表示
                });

            }, 1000);
        }

        function roll() {
            const rand = Math.random() * 100;
            let rarity = "";
            
            if (rand < 3) rarity = "SSR";      // 3%
            else if (rand < 20) rarity = "SR";  // 17%
            else rarity = "R";                 // 80%

            const list = characterPool[rarity];
            const name = list[Math.floor(Math.random() * list.length)];
            
            return { rarity, name };
        }
    </script>
</body>
</html>
