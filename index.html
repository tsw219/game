<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Coin Survival</title>
<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#0f172a;
color:white;
font-family:sans-serif;
}

#menu,#gameover{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#0f172a;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

canvas{display:block;}

#rules{
text-align:center;
line-height:1.6;
max-width:500px;
}

</style>
</head>
<body>

<div id="menu">

<h1>Coin Survival</h1>

<div id="rules">
矢印キーで移動してコインを集めよう。<br>
敵に当たるとゲームオーバー。<br>
Shiftキーで一瞬だけダッシュできます。
</div>

<br>

<input id="nameInput" placeholder="プレイヤー名（空欄でもOK）">

<button onclick="startGame()">START</button>

<h3>Top5</h3>
<div id="top5"></div>

</div>

<div id="gameover" style="display:none">

<h1>GAME OVER</h1>

<div id="finalScore"></div>

<h3>Ranking</h3>
<div id="ranking"></div>

<button onclick="backMenu()">最初の画面へ</button>

</div>

<div id="ui" style="display:none">
Score: <span id="score">0</span><br>
Dash: <span id="dash">Ready</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

let player
let enemies
let coins
let score
let running=false
let dashCooldown=0
let playerName=""

const keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key==="Shift" && dashCooldown<=0){
player.speed=8
setTimeout(()=>player.speed=4,200)
dashCooldown=10
}

})

document.addEventListener("keyup",e=>keys[e.key]=false)

function startGame(){

let input=document.getElementById("nameInput").value.trim()

if(input===""){
playerName=generatePlayer()
}else{
playerName=input
}

player={
x:200,
y:200,
size:22,
speed:4
}

enemies=[]
coins=[]
score=0

dashCooldown=0

spawnEnemies(6)
spawnCoin()

running=true

menu.style.display="none"
ui.style.display="block"

loop()

}

function spawnEnemies(n){
for(let i=0;i<n;i++){

enemies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:22,
speed:2+Math.random()*1.2
})

}
}

function spawnCoin(){
coins.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:10
})
}

function loop(){
if(!running)return
update()
draw()
requestAnimationFrame(loop)
}

function update(){

if(keys["ArrowUp"]) player.y-=player.speed
if(keys["ArrowDown"]) player.y+=player.speed
if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

for(const e of enemies){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

e.x+=dx/d*e.speed

e.y+=dy/d*e.speed

if(d<player.size+e.size){
endGame()
}

}

for(let i=coins.length-1;i>=0;i--){

let c=coins[i]
let d=Math.hypot(player.x-c.x,player.y-c.y)

if(d<player.size+c.size){
coins.splice(i,1)
score++
spawnCoin()
}

}

if(enemies.length<14 && Math.random()<0.015){
spawnEnemies(1)
}

if(dashCooldown>0){
dashCooldown-=1/60
}

scoreEl.textContent=score

dash.textContent=dashCooldown>0?Math.ceil(dashCooldown)+"s":"Ready"

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* coins */
ctx.fillStyle="gold"
for(const c of coins){
ctx.beginPath()
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()
}

/* enemies with face */
for(const e of enemies){

ctx.fillStyle="#ef4444"
ctx.beginPath()
ctx.arc(e.x,e.y,e.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(e.x-6,e.y-4,3,0,Math.PI*2)
ctx.arc(e.x+6,e.y-4,3,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(e.x,e.y+3,6,0,Math.PI)
ctx.stroke()

}

/* player with face */

ctx.fillStyle="#22d3ee"
ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(player.x-6,player.y-4,3,0,Math.PI*2)
ctx.arc(player.x+6,player.y-4,3,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(player.x,player.y+3,6,0,Math.PI)
ctx.stroke()

}

function endGame(){

running=false

saveScore()

ui.style.display="none"

gameover.style.display="flex"

finalScore.textContent="Score: "+score

showRanking()

}

function backMenu(){

gameover.style.display="none"
menu.style.display="flex"

showTop5()

}

function loadScores(){
return JSON.parse(localStorage.getItem("scores")||"{}")
}

function saveScore(){

let scores=loadScores()

if(!scores[playerName] || score>scores[playerName]){
scores[playerName]=score
}

localStorage.setItem("scores",JSON.stringify(scores))

}

function showTop5(){

let scores=loadScores()

let arr=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])
.slice(0,5)

top5.innerHTML=arr.map((s,i)=>`${i+1}. ${s[0]} : ${s[1]}`).join("<br>")

}

function showRanking(){

let scores=loadScores()

let arr=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])

ranking.innerHTML=arr.map((s,i)=>`${i+1}. ${s[0]} : ${s[1]}`).join("<br>")

}

function generatePlayer(){

let scores=loadScores()

let i=1

while(scores["Player"+i]){
i++
}

return "Player"+i

}

const scoreEl=document.getElementById("score")

showTop5()

</script>

</body>
</html>
