<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rhythm Drive</title>

<style>
body{
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

h1{margin:10px;}

#game{
    background:#111;
    display:block;
    margin:auto;
    border:3px solid white;
}

#panel{
    margin:10px;
    font-size:18px;
}

select,button{
    font-size:16px;
    padding:6px 10px;
    margin:5px;
}
</style>
</head>

<body>

<h1>🎵 Rhythm Drive</h1>

<canvas id="game" width="420" height="600"></canvas>

<div id="panel">
Score: <span id="score">0</span>
　
Combo: <span id="combo">0</span>
</div>

<div>
<select id="level">
    <option value="easy">EASY</option>
    <option value="normal">NORMAL</option>
    <option value="hard">HARD</option>
</select>

<button id="start">START</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreText=document.getElementById("score");
const comboText=document.getElementById("combo");
const startBtn=document.getElementById("start");
const levelSel=document.getElementById("level");

const lanes=[70,150,230,310];
const keys=["d","f","j","k"];

let notes=[];
let score=0;
let combo=0;
let playing=false;

// 音（ループ曲）
const music=new Audio(
"data:audio/wav;base64,UklGRmQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YUwAAAAA/////wAAAP///wAAAP///wAAAP///wAA"
);

// 難易度設定
const settings={
    easy:{speed:3,interval:90},
    normal:{speed:4,interval:65},
    hard:{speed:5.5,interval:45}
};

let speed=4;
let interval=70;
let frame=0;

// ノーツ生成
function makeNote(){
    notes.push({
        lane:Math.floor(Math.random()*4),
        y:-20,
        hit:false
    });
}

// スタート
function start(){

    const lv=levelSel.value;

    speed=settings[lv].speed;
    interval=settings[lv].interval;

    notes=[];
    score=0;
    combo=0;
    frame=0;

    playing=true;

    music.currentTime=0;
    music.loop=true;
    music.play();
}

startBtn.onclick=start;

// 入力
document.addEventListener("keydown",e=>{

    if(!playing) return;

    const key=e.key.toLowerCase();
    const lane=keys.indexOf(key);

    if(lane===-1) return;

    hit(lane);
});

// 判定
function hit(lane){

    for(let n of notes){

        if(n.lane!==lane||n.hit) continue;

        const d=Math.abs(n.y-520);

        if(d<15){
            score+=300;
            combo++;
            n.hit=true;
            return;
        }

        if(d<35){
            score+=100;
            combo++;
            n.hit=true;
            return;
        }
    }

    combo=0;
}

// 更新
function update(){

    if(!playing) return;

    frame++;

    // ノーツ生成
    if(frame%interval===0){
        makeNote();
    }

    // 移動
    for(let n of notes){
        n.y+=speed;
    }

    // Miss
    for(let n of notes){
        if(n.y>600&&!n.hit){
            n.hit=true;
            combo=0;
        }
    }

    notes=notes.filter(n=>!n.hit);

    scoreText.textContent=score;
    comboText.textContent=combo;
}

// 描画
function draw(){

    ctx.clearRect(0,0,420,600);

    // レーン
    for(let x of lanes){
        ctx.fillStyle="#222";
        ctx.fillRect(x-30,0,60,600);
    }

    // 判定線
    ctx.strokeStyle="yellow";
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(0,520);
    ctx.lineTo(420,520);
    ctx.stroke();

    // ノーツ
    for(let n of notes){

        ctx.fillStyle="cyan";

        ctx.beginPath();
        ctx.arc(
            lanes[n.lane],
            n.y,
            14,
            0,
            Math.PI*2
        );
        ctx.fill();
    }

    // キー表示
    ctx.fillStyle="white";
    ctx.font="18px sans-serif";

    keys.forEach((k,i)=>{
        ctx.fillText(
            k.toUpperCase(),
            lanes[i]-6,
            565
        );
    });
}

// ループ
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
