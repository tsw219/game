<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>One Day Escape</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  color: white;
  text-align: center;
}

#menu, #game, #clear {
  display: none;
  width: 100vw;
  height: 100vh;
}

.show {
  display: block;
}

h1 {
  margin-top: 30px;
}

.stage-btn {
  display: inline-block;
  margin: 20px;
  cursor: pointer;
}

.stage-btn img {
  width: 200px;
  height: 140px;
  border: 3px solid white;
}

#gameArea {
  position: relative;
  width: 90vw;
  height: 80vh;
  margin: auto;
  border: 3px solid white;
  background-size: cover;
  background-position: center;
}

/* 見えない違い */
.diff {
  position: absolute;
  border: 2px solid rgba(255,0,0,0.0);
}

.diff.found {
  border: 2px solid red;
  background: rgba(255,0,0,0.2);
}

#info {
  margin-top: 10px;
  font-size: 20px;
}

#timer {
  font-size: 22px;
  margin: 10px;
}
</style>
</head>

<body>

<!-- メニュー -->
<div id="menu" class="show">
  <h1>One Day Escape</h1>
  <p>画像の違いをすべて見つけろ</p>

  <div class="stage-btn" onclick="startGame('school')">
    <img src="https://picsum.photos/400/300?school">
    <div>学校</div>
  </div>

  <div class="stage-btn" onclick="startGame('home')">
    <img src="https://picsum.photos/400/300?room">
    <div>家</div>
  </div>

  <div class="stage-btn" onclick="startGame('library')">
    <img src="https://picsum.photos/400/300?library">
    <div>図書館</div>
  </div>

  <div class="stage-btn" onclick="startGame('mall')">
    <img src="https://picsum.photos/400/300?mall">
    <div>モール</div>
  </div>
</div>

<!-- ゲーム -->
<div id="game">

  <div id="timer">残り時間: 08:00</div>

  <div id="gameArea"></div>

  <div id="info">
    見つけた数: <span id="count">0</span> / 5
  </div>

</div>

<!-- クリア -->
<div id="clear">

  <h1>ESCAPE SUCCESS!</h1>

  <p>脱出成功！</p>

  <button onclick="backMenu()">タイトルへ</button>

</div>

<script>

const menu = document.getElementById("menu");
const game = document.getElementById("game");
const clear = document.getElementById("clear");

const gameArea = document.getElementById("gameArea");
const countText = document.getElementById("count");
const timerText = document.getElementById("timer");

let found = 0;
let time = 480;
let timer;

const stages = {

  school: {
    bg: "https://picsum.photos/1200/800?classroom",
    diffs: [
      {x:20,y:30,w:80,h:60},
      {x:200,y:100,w:60,h:70},
      {x:400,y:200,w:90,h:50},
      {x:600,y:120,w:70,h:80},
      {x:750,y:300,w:80,h:60},
    ]
  },

  home: {
    bg: "https://picsum.photos/1200/800?bedroom",
    diffs: [
      {x:100,y:50,w:80,h:70},
      {x:300,y:200,w:90,h:60},
      {x:500,y:100,w:70,h:80},
      {x:650,y:250,w:60,h:70},
      {x:780,y:150,w:80,h:60},
    ]
  },

  library: {
    bg: "https://picsum.photos/1200/800?books",
    diffs: [
      {x:50,y:80,w:90,h:70},
      {x:220,y:200,w:80,h:60},
      {x:420,y:150,w:70,h:90},
      {x:600,y:300,w:60,h:70},
      {x:780,y:100,w:90,h:60},
    ]
  },

  mall: {
    bg: "https://picsum.photos/1200/800?shopping",
    diffs: [
      {x:100,y:200,w:80,h:70},
      {x:280,y:100,w:70,h:80},
      {x:450,y:250,w:90,h:60},
      {x:620,y:150,w:60,h:70},
      {x:800,y:300,w:80,h:60},
    ]
  }

};


function startGame(name){

  menu.classList.remove("show");
  game.classList.add("show");

  found = 0;
  time = 480;

  countText.textContent = found;

  gameArea.innerHTML = "";

  const stage = stages[name];

  gameArea.style.backgroundImage =
    `url(${stage.bg})`;

  stage.diffs.forEach((d)=>{

    const div = document.createElement("div");

    div.className = "diff";

    div.style.left = d.x+"px";
    div.style.top = d.y+"px";
    div.style.width = d.w+"px";
    div.style.height = d.h+"px";

    div.onclick = ()=>{

      if(div.classList.contains("found")) return;

      div.classList.add("found");

      found++;
      countText.textContent = found;

      if(found >= 5){
        clearGame();
      }
    };

    gameArea.appendChild(div);

  });

  startTimer();

}


function startTimer(){

  clearInterval(timer);

  timer = setInterval(()=>{

    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    timerText.textContent =
      `残り時間: 0${m}:${s<10?"0"+s:s}`;

    if(time<=0){
      alert("TIME OVER");
      backMenu();
    }

  },1000);

}


function clearGame(){

  clearInterval(timer);

  game.classList.remove("show");
  clear.classList.add("show");

}


function backMenu(){

  clearInterval(timer);

  game.classList.remove("show");
  clear.classList.remove("show");
  menu.classList.add("show");

}

</script>

</body>
</html>
