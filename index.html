<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脱出ゲーム</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#dff6ff;
}

/* 画面 */
.screen{
display:none;
width:100%;
height:100vh;
}

#menu{
display:block;
text-align:center;
padding-top:40px;
}

/* 街ボタン */
.city{
width:280px;
margin:15px auto;
padding:20px;
background:#4facfe;
color:white;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.city:hover{
background:#00c6ff;
}

/* ゲーム */
#game{
position:relative;
background:white;
}

/* 上 */
#top{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
}

/* メイン */
#main{
text-align:center;
margin-top:100px;
}

/* 下テキスト */
#text{
position:absolute;
bottom:0;
width:100%;
background:black;
color:white;
padding:20px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- メニュー -->
<div id="menu" class="screen">
<h1>5つの街からの脱出</h1>

<div class="city" onclick="startGame()">静止した住宅街</div>
<div class="city">未実装</div>
<div class="city">未実装</div>
<div class="city">未実装</div>
<div class="city">未実装</div>
</div>

<!-- ゲーム -->
<div id="game" class="screen">

<div id="top">
<button onclick="goMenu()">戻る</button><br>
アイテム: <span id="items">なし</span>
</div>

<div id="main"></div>

<div id="text" onclick="nextText()">クリックで進む</div>

</div>

<script>
let texts=[];
let index=0;
let items=[];

/* 画面切替 */
function show(id){
document.querySelectorAll(".screen").forEach(e=>e.style.display="none");
document.getElementById(id).style.display="block";
}

/* 開始 */
function startGame(){
show("game");

texts=[
"誰もいない街に来てしまった",
"探索して手がかりを探そう"
];
index=0;
nextText();

showStreet();
}

/* テキスト */
function nextText(){
if(index < texts.length){
document.getElementById("text").innerText=texts[index];
index++;
}
}

/* 街 */
function showStreet(){
document.getElementById("main").innerHTML=`
<h2>住宅街</h2>
<button onclick="enterHouse()">家に入る</button>
<button onclick="enterShop()">店に入る</button>
`;
}

/* 家 */
function enterHouse(){
document.getElementById("main").innerHTML=`
<h2>家</h2>
<button onclick="getItem()">机を調べる</button>
<button onclick="showStreet()">戻る</button>
`;
}

/* 店 */
function enterShop(){
document.getElementById("main").innerHTML=`
<h2>店</h2>
<button onclick="hint('3月15日')">カレンダー</button>
<button onclick="hint('午後3時')">メモ</button>
<button onclick="solve()">時計</button>
<button onclick="showStreet()">戻る</button>
`;
}

/* アイテム */
function getItem(){
if(!items.includes("電池")){
items.push("電池");
updateItems();
setText("電池を手に入れた");
}
}

function updateItems(){
document.getElementById("items").innerText=items.join(",");
}

/* ヒント */
function hint(msg){
setText(msg);
}

/* 解答 */
function solve(){
let ans=prompt("時間は？");

if(ans==="15"){
setText("クリア！");
setTimeout(goMenu,1500);
}else{
setText("違う");
}
}

/* テキスト */
function setText(t){
document.getElementById("text").innerText=t;
}

/* 戻る */
function goMenu(){
show("menu");
items=[];
updateItems();
}
</script>

</body>
</html>
