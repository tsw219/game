<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脱出ゲーム</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#bfe9ff,#e6f7ff);
}

.screen{
display:none;
text-align:center;
padding-top:100px;
}

#titleScreen{
display:block;
}

button{
padding:15px 30px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="titleScreen" class="screen">
<h1>脱出ゲーム</h1>
<button onclick="goSelect()">START</button>
</div>

<div id="selectScreen" class="screen">
<h2>街を選択</h2>
<button onclick="alert('OK動いてる')">テストボタン</button>
</div>

<script>
function goSelect(){
document.getElementById("titleScreen").style.display="none";
document.getElementById("selectScreen").style.display="block";
}
</script>

</body>
</html>
