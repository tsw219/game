<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Coin Survival</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
overflow:hidden;
}

#menu{
position:absolute;
width:100%;
top:120px;
text-align:center;
}

canvas{
background:black;
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="menu">

<h1>Coin Survival</h1>

<p>
矢印キーで移動<br>
コインを集めてスコアアップ<br>
敵に当たるとゲームオーバー<br>
Shiftで一瞬ダッシュ
</p>

<input id="nameInput" placeholder="プレイヤー名（空欄でもOK）">

<br><br>

<button onclick="startGame()">START</button>

<h3>Top5</h3>
<div id="top5"></div>

</div>

<div id="ui" style="display:none">
Score: <span id="score">0</span><br>
High Score: <span id="high">0</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

let player
let enemies=[]
let coins=[]
let score=0
let running=false
let dashCooldown=0
let playerName=""

const keys={}

document.addEventListener("keydown",e=>{
keys[e.key]=true

if(e.key==="Shift" && dashCooldown<=0){
player.speed=8
setTimeout(()=>player.speed=4,200)
dashCooldown=10
}
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function startGame(){

let name=document.getElementById("nameInput").value.trim()

if(name===""){
playerName="Player"+Math.floor(Math.random()*1000)
}else{
playerName=name
}

player={
x:200,
y:200,
size:22,
speed:4
}

enemies=[]
coins=[]
score=0
dashCooldown=0

spawnEnemies(3)
spawnCoin()

running=true

menu.style.display="none"
ui.style.display="block"

updateHigh()

loop()

}

function spawnEnemies(n){

for(let i=0;i<n;i++){

enemies.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:22,
speed:2
})

}

}

function spawnCoin(){

coins.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:10
})

}

function loop(){

if(!running)return

update()
draw()

requestAnimationFrame(loop)

}

function update(){

if(keys["ArrowUp"]) player.y-=player.speed
if(keys["ArrowDown"]) player.y+=player.speed
if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

for(const e of enemies){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

e.x+=dx/d*e.speed
e.y+=dy/d*e.speed

if(d<player.size+e.size){
gameOver()
}

}

for(let i=coins.length-1;i>=0;i--){

let c=coins[i]

let d=Math.hypot(player.x-c.x,player.y-c.y)

if(d<player.size+c.size){

coins.splice(i,1)

score++

spawnCoin()

if(score%5===0){
spawnEnemies(1)
}

}

}

if(dashCooldown>0){
dashCooldown-=1/60
}

scoreEl.textContent=score

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* coins */

ctx.fillStyle="gold"

for(const c of coins){

ctx.beginPath()
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()

}

/* enemies */

for(const e of enemies){

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(e.x,e.y,e.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(e.x-6,e.y-4,3,0,Math.PI*2)
ctx.arc(e.x+6,e.y-4,3,0,Math.PI*2)
ctx.fill()

}

/* player */

ctx.fillStyle="cyan"

ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(player.x-6,player.y-4,3,0,Math.PI*2)
ctx.arc(player.x+6,player.y-4,3,0,Math.PI*2)
ctx.fill()

}

function gameOver(){

running=false

saveScore()

alert("Game Over\nScore: "+score)

location.reload()

}

function loadScores(){
return JSON.parse(localStorage.getItem("scores")||"{}")
}

function saveScore(){

let scores=loadScores()

if(!scores[playerName] || score>scores[playerName]){
scores[playerName]=score
}

localStorage.setItem("scores",JSON.stringify(scores))

}

function updateHigh(){

let scores=loadScores()

let high=0

for(let p in scores){
if(scores[p]>high) high=scores[p]
}

document.getElementById("high").textContent=high

}

function showTop5(){

let scores=loadScores()

let arr=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])
.slice(0,5)

top5.innerHTML=arr.map((s,i)=>`${i+1}. ${s[0]} : ${s[1]}`).join("<br>")

}

const scoreEl=document.getElementById("score")

showTop5()

</script>

</body>
</html>
