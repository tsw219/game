<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>影と光の迷路</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

canvas{
  background:black;
  border:3px solid white;
  margin:auto;
  display:none;
}

/* タイトル画面 */
#startScreen{
  margin-top:50px;
  max-width:450px;
  margin-left:auto;
  margin-right:auto;
}

/* 上バー */
#topBar{
  display:none;
  width:400px;
  margin:10px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#backBtn{
  padding:5px 10px;
  font-size:14px;
  cursor:pointer;
}

/* メッセージ */
#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.7);
  color:white;
  font-size:40px;
}

#overlay button{
  margin-top:20px;
  padding:10px 20px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- タイトル -->
<div id="startScreen">
<h1>影と光の迷路</h1>

<p style="text-align:left">

【操作】<br>
矢印キーで移動<br><br>

【色】<br>
🟩 自分 / ⬜ 壁 / ⬛ 道<br>
🟥 敵 / 🟨 ゴール<br><br>

【敵の動き】<br>
・あなたに近づく方向へ1マスずつ移動<br>
・壁は通れない<br>
・たまにランダム移動<br><br>

【ルール】<br>
・動くと光が減る<br>
・敵に当たると負け<br>
・ゴールでLvUP<br>

</p>

<button id="startBtn">スタート</button>
</div>

<!-- 上バー -->
<div id="topBar">
<div id="levelText"></div>
<button id="backBtn">タイトルへ</button>
</div>

<!-- ゲーム -->
<canvas id="game" width="400" height="400"></canvas>

<!-- オーバーレイ -->
<div id="overlay">
<div id="overlayText"></div>
<button id="restartBtn">もう一度</button>
<button id="titleBtn">タイトルへ</button>
</div>

<script>
// ================= 音 =================
const audio=new AudioContext();

function playSound(f,t=0.15,type="square"){
 const o=audio.createOscillator();
 const g=audio.createGain();
 o.type=type;
 o.frequency.value=f;
 g.gain.value=0.1;
 o.connect(g);
 g.connect(audio.destination);
 o.start();
 o.stop(audio.currentTime+t);
}

function moveSound(){playSound(400,0.05);}
function startSound(){playSound(600,0.3);}
function clearSound(){playSound(900,0.4);}
function overSound(){playSound(150,0.8,"sawtooth");}

// ================= ゲーム =================
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const SIZE=20;
const ROWS=20;
const COLS=20;

let level=1;
let maze,enemies,player,light;
let playing=false;

const startScreen=document.getElementById("startScreen");
const topBar=document.getElementById("topBar");
const overlay=document.getElementById("overlay");
const overlayText=document.getElementById("overlayText");
const levelText=document.getElementById("levelText");

// 難易度
function diff(){
 return{
  wall:0.05+level*0.03,
  enemy:Math.min(level,5),
  light:Math.max(3,6-level*0.3)
 };
}

// 迷路
function makeMaze(){
 const d=diff();
 let m=[];
 for(let y=0;y<ROWS;y++){
  m[y]=[];
  for(let x=0;x<COLS;x++){
   if(y==0||x==0||y==ROWS-1||x==COLS-1) m[y][x]=1;
   else m[y][x]=Math.random()<d.wall?1:0;
  }
 }
 m[1][1]=0;
 m[ROWS-2][COLS-2]=0;
 return m;
}

// 敵
function makeEnemies(){
 const d=diff();
 let list=[];
 for(let i=0;i<d.enemy;i++){
  let x,y;
  do{
   x=Math.floor(Math.random()*(COLS-2))+1;
   y=Math.floor(Math.random()*(ROWS-2))+1;
  }while(maze[y][x]==1);
  list.push({x,y});
 }
 return list;
}

// 描画
function draw(){
 ctx.clearRect(0,0,400,400);

 for(let y=0;y<ROWS;y++){
  for(let x=0;x<COLS;x++){

   let d=Math.hypot(x-player.x,y-player.y);
   if(d<=light){

    ctx.fillStyle=maze[y][x]?"white":"#444";
    ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
   }
  }
 }

 // ゴール
 let gx=COLS-2,gy=ROWS-2;
 if(Math.hypot(gx-player.x,gy-player.y)<=light){
  ctx.fillStyle="gold";
  ctx.fillRect(gx*SIZE,gy*SIZE,SIZE,SIZE);
 }

 // 敵
 enemies.forEach(e=>{
  if(Math.hypot(e.x-player.x,e.y-player.y)<=light){
   ctx.fillStyle="red";
   ctx.fillRect(e.x*SIZE,e.y*SIZE,SIZE,SIZE);
  }
 });

 // プレイヤー
 ctx.fillStyle="#0f0";
 ctx.fillRect(player.x*SIZE,player.y*SIZE,SIZE,SIZE);
}

// 敵AI
function moveEnemies(){

 enemies.forEach(e=>{

  let dirs=[
   {x:1,y:0},{x:-1,y:0},
   {x:0,y:1},{x:0,y:-1}
  ];

  // 70%で追跡
  if(Math.random()<0.7){

   dirs.sort((a,b)=>{
    let da=Math.hypot(player.x-(e.x+a.x),player.y-(e.y+a.y));
    let db=Math.hypot(player.x-(e.x+b.x),player.y-(e.y+b.y));
    return da-db;
   });
  }
  // 移動
  for(let d of dirs){
   let nx=e.x+d.x;
   let ny=e.y+d.y;
   if(maze[ny][nx]==0){
    e.x=nx;
    e.y=ny;
    break;
   }
  }
 });
}

// 初期化
function reset(){
 maze=makeMaze();
 enemies=makeEnemies();
 player={x:1,y:1};
 light=diff().light;
 levelText.innerText="Lv "+level;
 draw();
}

// 終了画面
function showOverlay(text){
 overlayText.innerText=text;
 overlay.style.display="flex";
 playing=false;
}

// 操作
document.addEventListener("keydown",e=>{

 if(!playing) return;

 let nx=player.x,ny=player.y;

 if(e.key=="ArrowUp") ny--;
 if(e.key=="ArrowDown") ny++;
 if(e.key=="ArrowLeft") nx--;
 if(e.key=="ArrowRight") nx++;

 if(maze[ny][nx]==0){
  player={x:nx,y:ny};
  moveSound();
  light=Math.max(2,light-0.15);
 }

 moveEnemies();

 // 敵
 for(let en of enemies){
  if(en.x==player.x&&en.y==player.y){
   overSound();
   showOverlay("GAME OVER");
   return;
  }
 }

 // ゴール
 if(player.x==COLS-2&&player.y==ROWS-2){
  clearSound();
  level++;
  reset();
 }

 draw();
});

// スタート
document.getElementById("startBtn").onclick=()=>{

 audio.resume();
 startSound();

 startScreen.style.display="none";
 topBar.style.display="flex";
 canvas.style.display="block";

 level=1;
 playing=true;

 reset();
};

// 再開
document.getElementById("restartBtn").onclick=()=>{
 overlay.style.display="none";
 level=1;
 playing=true;
 reset();
};

// タイトルへ
function backToTitle(){
 overlay.style.display="none";
 canvas.style.display="none";
 topBar.style.display="none";
 startScreen.style.display="block";
 playing=false;
}

document.getElementById("titleBtn").onclick=backToTitle;
document.getElementById("backBtn").onclick=backToTitle;

</script>
</body>
</html>
