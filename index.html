<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>5つの街からの脱出</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#c2f0ff,#ffffff);
}

/* タイトル＋選択 */
#menu{
padding:30px;
text-align:center;
}

h1{
font-size:40px;
margin-bottom:20px;
}

/* 街カード（縦並び） */
.city{
width:300px;
height:120px;
margin:15px auto;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

.city:hover{
transform:scale(1.05);
}

.c1{background:linear-gradient(#667eea,#764ba2);}
.c2{background:linear-gradient(#f6d365,#fda085);}
.c3{background:linear-gradient(#43cea2,#185a9d);}
.c4{background:linear-gradient(#fa709a,#fee140);}
.c5{background:linear-gradient(#30cfd0,#330867);}

/* ゲーム画面 */
#game{
display:none;
height:100vh;
position:relative;
}

/* シーン */
#scene{
height:70%;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
}

/* テキスト */
#text{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:black;
color:white;
padding:20px;
cursor:pointer;
}

/* アイテム */
#items{
position:absolute;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- メニュー -->
<div id="menu">
<h1>5つの街からの脱出</h1>

<div class="city c1" onclick="startCity1()">静止した住宅街</div>
<div class="city c2">音のない商店街</div>
<div class="city c3">閉ざされた学校</div>
<div class="city c4">記録が残らない街</div>
<div class="city c5">もう一人の自分の街</div>

</div>

<!-- ゲーム -->
<div id="game">

<div id="items">アイテム: <span id="itemList">なし</span></div>

<div id="scene"></div>

<div id="text" onclick="nextText()">クリックで進む</div>

</div>

<script>
let texts = [];
let index = 0;
let items = [];

/* 開始 */
function startCity1(){
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

texts = [
"気づくと、誰もいない住宅街にいた。",
"すべての時計が止まっている。",
"正しい時間を見つけろ。"
];

index = 0;
nextText();
loadScene();
}

/* テキスト送り（確実に動く） */
function nextText(){
if(index < texts.length){
document.getElementById("text").innerText = texts[index];
index++;
}
}

/* シーン */
function loadScene(){
document.getElementById("scene").innerHTML = `
<div>
<p>壊れた時計</p>
<button onclick="getItem()">調べる</button>

<p>カレンダー</p>
<button onclick="showHint('3月15日')">見る</button>

<p>日記</p>
<button onclick="showHint('午後3時に外出')">読む</button>

<br><br>

<input id="answer" placeholder="時間（例:15）">
<button onclick="checkAnswer()">入力</button>
</div>
`;
}

/* アイテム */
function getItem(){
if(!items.includes("電池")){
items.push("電池");
updateItems();
setText("電池を手に入れた");
}
}

function updateItems(){
document.getElementById("itemList").innerText = items.join(",");
}

/* ヒント */
function showHint(msg){
setText(msg);
}

/* 判定 */
function checkAnswer(){
let val = document.getElementById("answer").value;

if(val === "15"){
texts = ["時計が動き出した","出口が現れた","脱出成功"];
index = 0;
nextText();
}else{
texts = ["違う時間だ","最初に戻された"];
index = 0;
items = [];
updateItems();
nextText();
}
}

/* テキスト直接表示 */
function setText(msg){
document.getElementById("text").innerText = msg;
}
</script>

</body>
</html>
