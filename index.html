<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Kart</title>

<style>
body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#2b2b2b;
border:3px solid white;
display:block;
margin:auto;
}

h1{
margin:10px;
}
</style>
</head>

<body>

<h1>🏎️ Mini Kart</h1>
<p>↑加速 ↓ブレーキ ←→ハンドル</p>

<canvas id="game" width="800" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:400,
y:350,
speed:0,
angle:0
}

let enemies=[
{x:300,y:200,speed:2},
{x:500,y:150,speed:2.3}
]

let boosts=[]

for(let i=0;i<5;i++){
boosts.push({
x:Math.random()*700+50,
y:Math.random()*400+50
})
}

function update(){

if(keys["ArrowUp"]) player.speed+=0.1
if(keys["ArrowDown"]) player.speed-=0.1

player.speed*=0.98

if(keys["ArrowLeft"]) player.angle-=0.05
if(keys["ArrowRight"]) player.angle+=0.05

player.x+=Math.cos(player.angle)*player.speed
player.y+=Math.sin(player.angle)*player.speed

// 敵
for(let e of enemies){

let dx=player.x-e.x
let dy=player.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<30){
player.speed*=0.5
}

e.y+=e.speed

if(e.y>500) e.y=-50
}

// ブースト
for(let b of boosts){

let dx=player.x-b.x
let dy=player.y-b.y

if(Math.sqrt(dx*dx+dy*dy)<25){
player.speed+=3

b.x=Math.random()*700+50
b.y=Math.random()*400+50
}

}

}

function draw(){

ctx.clearRect(0,0,800,500)

// 道
ctx.fillStyle="#444"
ctx.fillRect(100,0,600,500)

// ブースト
ctx.fillStyle="yellow"

for(let b of boosts){

ctx.beginPath()
ctx.arc(b.x,b.y,10,0,Math.PI*2)
ctx.fill()

}

// 敵
ctx.fillStyle="red"

for(let e of enemies){

ctx.fillRect(e.x-10,e.y-10,20,20)

}

// プレイヤー
ctx.save()

ctx.translate(player.x,player.y)
ctx.rotate(player.angle)

ctx.fillStyle="cyan"
ctx.fillRect(-12,-12,24,24)

ctx.restore()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
