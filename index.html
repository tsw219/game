<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テトリス風ゲーム</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100vh;
    margin: 0;
  }
  h1 { margin-top: 20px; }
  canvas {
    background: #222;
    margin-top: 20px;
    border: 2px solid #fff;
  }
  #score {
    margin-top: 10px;
    font-size: 20px;
  }
</style>
</head>
<body>

<h1>テトリス風ゲーム</h1>
<canvas id="tetris" width="240" height="480"></canvas>
<div id="score">Score: 0</div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const ROW = 20;
const COL = 10;
const BLOCK = 24;
const WIDTH = COL * BLOCK;
const HEIGHT = ROW * BLOCK;
canvas.width = WIDTH;
canvas.height = HEIGHT;

context.scale(BLOCK, BLOCK);

const colors = [
  null,
  '#FF0D72',
  '#0DC2FF',
  '#0DFF72',
  '#F538FF',
  '#FF8E0D',
  '#FFE138',
  '#3877FF'
];

const tetrominoes = [
  [[1,1,1,1]], // I
  [[2,0,0],[2,2,2]], // J
  [[0,0,3],[3,3,3]], // L
  [[4,4],[4,4]], // O
  [[0,5,5],[5,5,0]], // S
  [[0,6,0],[6,6,6]], // T
  [[7,7,0],[0,7,7]]  // Z
];

function createMatrix(w,h){
  const matrix = [];
  while(h--) matrix.push(new Array(w).fill(0));
  return matrix;
}

function drawMatrix(matrix, offset){
  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if(value){
        context.fillStyle = colors[value];
        context.fillRect(x + offset.x, y + offset.y,1,1);
      }
    });
  });
}

function merge(arena, player){
  player.matrix.forEach((row,y)=>{
    row.forEach((value,x)=>{
      if(value) arena[y + player.pos.y][x + player.pos.x] = value;
    });
  });
}

function collide(arena, player){
  const [m, o] = [player.matrix, player.pos];
  for(let y=0; y<m.length; ++y){
    for(let x=0; x<m[y].length; ++x){
      if(m[y][x] && (arena[y+o.y] && arena[y+o.y][x+o.x]) !==0){
        return true;
      }
    }
  }
  return false;
}

function rotate(matrix, dir){
  for(let y=0; y<matrix.length; ++y){
    for(let x=0; x<y; ++x){
      [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
  }
  if(dir>0) matrix.forEach(row=>row.reverse());
  else matrix.reverse();
}

function playerReset(){
  const pieces = 'IJLOSTZ';
  const type = pieces[Math.floor(Math.random()*pieces.length)];
  player.matrix = tetrominoes[pieces.indexOf(type)];
  player.pos.y = 0;
  player.pos.x = Math.floor(COL/2) - Math.floor(player.matrix[0].length/2);
  if(collide(arena, player)){
    arena.forEach(row => row.fill(0));
    score = 0;
    updateScore();
  }
}

function playerDrop(){
  player.pos.y++;
  if(collide(arena, player)){
    player.pos.y--;
    merge(arena, player);
    sweep();
    playerReset();
  }
  dropCounter = 0;
}

function sweep(){
  let rowCount = 1;
  outer: for(let y=arena.length-1; y>=0; --y){
    for(let x=0; x<arena[y].length; ++x){
      if(arena[y][x] === 0) continue outer;
    }
    const row = arena.splice(y,1)[0].fill(0);
    arena.unshift(row);
    score += rowCount * 10;
    rowCount *= 2;
    y++;
  }
  updateScore();
}

function playerMove(dir){
  player.pos.x += dir;
  if(collide(arena, player)) player.pos.x -= dir;
}

function playerRotate(dir){
  const pos = player.pos.x;
  rotate(player.matrix, dir);
  let offset = 1;
  while(collide(arena, player)){
    player.pos.x += offset;
    offset = -(offset + (offset>0?1:-1));
    if(offset>player.matrix[0].length){
      rotate(player.matrix, -dir);
      player.pos.x = pos;
      return;
    }
  }
}

let arena = createMatrix(COL, ROW);
let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;
let score = 0;

const player = {
  pos: {x:0,y:0},
  matrix: null
};

function update(time=0){
  const deltaTime = time - lastTime;
  lastTime = time;
  dropCounter += deltaTime;
  if(dropCounter > dropInterval){
    playerDrop();
  }
  draw();
  requestAnimationFrame(update);
}

function draw(){
  context.fillStyle = '#222';
  context.fillRect(0,0,WIDTH,HEIGHT);
  drawMatrix(arena,{x:0,y:0});
  drawMatrix(player.matrix,player.pos);
}

function updateScore(){
  document.getElementById('score').innerText = 'Score: ' + score;
}

document.addEventListener('keydown', event => {
  if(event.key === 'ArrowLeft') playerMove(-1);
  else if(event.key === 'ArrowRight') playerMove(1);
  else if(event.key === 'ArrowDown') playerDrop();
  else if(event.key === 'ArrowUp') playerRotate(1);
});

playerReset();
update();
</script>

</body>
</html>
