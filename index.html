<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>影と光の迷路</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

canvas{
  background:black;
  border:3px solid white;
  display:none;
  margin:auto;
}

#startScreen{
  margin-top:100px;
}

button{
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
  background:#0f0;
  border:none;
  border-radius:8px;
}

#message{
  position:absolute;
  top:40%;
  width:100%;
  font-size:40px;
  color:yellow;
  display:none;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>影と光の迷路</h1>

  <p>
    【ルール】<br>
    ・矢印キーで移動<br>
    ・光は動くたびに減る<br>
    ・赤＝敵（当たると負け）<br>
    ・黄色＝ゴール<br>
    ・進むとレベルUP！
  </p>

  <button id="startBtn">スタート</button>
</div>

<h2 id="levelText"></h2>

<canvas id="game" width="400" height="400"></canvas>

<div id="message"></div>

<script>
// ================= 音システム =================

const audio = new AudioContext();

function playSound(freq,time=0.15,type="square"){
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.value = 0.1;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();
  osc.stop(audio.currentTime + time);
}

// 各音
function moveSound(){ playSound(400,0.05); }
function startSound(){ playSound(600,0.3); }
function clearSound(){ playSound(900,0.4); }
function levelUpSound(){ playSound(1200,0.3); }
function gameOverSound(){ playSound(150,0.8,"sawtooth"); }

// BGM
let bgmTimer=null;

function startBGM(){
  bgmTimer=setInterval(()=>{
    playSound(220,0.2,"sine");
  },800);
}

function stopBGM(){
  clearInterval(bgmTimer);
}

// ================= ゲーム本体 =================

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const SIZE=20;
const ROWS=20;
const COLS=20;

let level=1;
let maze=[];
let enemies=[];
let player={x:1,y:1};
let light=5;
let started=false;

const msg=document.getElementById("message");
const levelText=document.getElementById("levelText");

// 迷路生成
function makeMaze(){
  let m=[];
  for(let y=0;y<ROWS;y++){
    m[y]=[];
    for(let x=0;x<COLS;x++){
      if(y==0||x==0||y==ROWS-1||x==COLS-1){
        m[y][x]=1;
      }else{
        m[y][x]=Math.random()<0.15+level*0.05?1:0;
      }
    }
  }

  m[1][1]=0;
  m[ROWS-2][COLS-2]=0;

  return m;
}

// 敵生成
function makeEnemies(){
  let list=[];

  for(let i=0;i<level;i++){
    let x,y;

    do{
      x=Math.floor(Math.random()*(COLS-2))+1;
      y=Math.floor(Math.random()*(ROWS-2))+1;
    }while(maze[y][x]==1);

    list.push({x,y});
  }

  return list;
}

// 描画
function draw(){
  ctx.clearRect(0,0,400,400);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){

      let dx=x-player.x;
      let dy=y-player.y;

      if(Math.sqrt(dx*dx+dy*dy)<=light){

        if(maze[y][x]==1) ctx.fillStyle="white";
        else ctx.fillStyle="#444";

        ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
      }
    }
  }

  // ゴール
  let gx=COLS-2,gy=ROWS-2;
  let d=Math.hypot(gx-player.x,gy-player.y);

  if(d<=light){
    ctx.fillStyle="gold";
    ctx.fillRect(gx*SIZE,gy*SIZE,SIZE,SIZE);
  }

  // 敵
  enemies.forEach(e=>{
    let d=Math.hypot(e.x-player.x,e.y-player.y);
    if(d<=light){
      ctx.fillStyle="red";
      ctx.fillRect(e.x*SIZE,e.y*SIZE,SIZE,SIZE);
    }
  });

  // プレイヤー
  ctx.fillStyle="#0f0";
  ctx.fillRect(player.x*SIZE,player.y*SIZE,SIZE,SIZE);
}

// 敵移動
function moveEnemies(){
  enemies.forEach(e=>{

    let dx=player.x-e.x;
    let dy=player.y-e.y;

    if(Math.abs(dx)>Math.abs(dy)){
      e.x+=dx>0?1:-1;
    }else{
      e.y+=dy>0?1:-1;
    }
  });
}

// メッセージ表示
function show(text){
  msg.innerText=text;
  msg.style.display="block";

  setTimeout(()=>{
    msg.style.display="none";
  },1200);
}

// レベル初期化
function reset(){
  maze=makeMaze();
  enemies=makeEnemies();

  player={x:1,y:1};
  light=5;

  levelText.innerText="Lv "+level;
}

// 操作
document.addEventListener("keydown",e=>{

  if(!started) return;

  let nx=player.x;
  let ny=player.y;

  if(e.key=="ArrowUp") ny--;
  if(e.key=="ArrowDown") ny++;
  if(e.key=="ArrowLeft") nx--;
  if(e.key=="ArrowRight") nx++;

  if(maze[ny][nx]==0){
    player={x:nx,y:ny};
    moveSound();
    light=Math.max(2,light-0.2);
  }

  moveEnemies();

  // 敵判定
  for(let e of enemies){
    if(e.x==player.x && e.y==player.y){
      gameOverSound();
      stopBGM();

      alert("ゲームオーバー");

      level=1;
      reset();
      startBGM();
    }
  }

  // ゴール
  if(player.x==COLS-2 && player.y==ROWS-2){

    clearSound();
    show("CLEAR!");

    level++;
    levelUpSound();

    reset();
  }

  draw();
});

// スタート
document.getElementById("startBtn").onclick=()=>{

  audio.resume(); // 音有効化

  startSound();

  document.getElementById("startScreen").style.display="none";
  canvas.style.display="block";

  started=true;

  reset();
  draw();

  startBGM();
};
</script>
</body>
</html>
